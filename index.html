<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deploy Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0b0d;color:#e4e6ef;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#12141a;border:1px solid #1e2130;border-radius:16px;padding:3rem;max-width:480px;text-align:center}
.dot{width:14px;height:14px;background:#4ade80;border-radius:50%;margin:0 auto 2rem;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 12px rgba(74,222,128,0.4)}50%{box-shadow:0 0 24px rgba(74,222,128,0.6)}}
h1{font-size:1.8rem;margin-bottom:.5rem}
.sub{color:#6b6f85;margin-bottom:2rem}
.row{display:flex;justify-content:space-between;padding:.6rem 1rem;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.1);border-radius:8px;margin-bottom:.5rem;font-family:monospace;font-size:.85rem}
.lbl{color:#6b6f85}
.val{color:#4ade80;font-weight:700}
.wolf{font-size:1.4rem;margin-top:1.5rem}
</style>
</head>
<body>
<div class="card">
<div class="dot"></div>
<h1>Deploy Verified</h1>
<p class="sub">Your pipeline is live.</p>
<div class="row"><span class="lbl">HTML</span><span class="val">PASS</span></div>
<div class="row"><span class="lbl">CSS</span><span class="val">PASS</span></div>
<div class="row"><span class="lbl">JS Runtime</span><span class="val">PASS</span></div>
<div class="row"><span class="lbl">Static Assets</span><span class="val">PASS</span></div>
<div class="wolf">🐺</div>
</div>
</body>
</html>
