<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Noah Lucas terminal interface - AI-native product operating studio." />
    <title>Noah Lucas | Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="terminal-theme">
    <div class="atmosphere" aria-hidden="true"></div>
    <main class="terminal-shell">
      <header class="terminal-bar">
        <p>NOAHLUCAS // PRODUCT AS PLATFORM</p>
        <p id="terminal-clock">--:--:--</p>
      </header>
      <section class="terminal-screen">
        <pre id="boot-log" class="terminal-log" aria-live="polite"></pre>
        <pre id="ascii-hero" class="ascii-hero terminal-ascii"></pre>
        <div id="terminal-output" class="terminal-output"></div>
        <form id="terminal-form" class="terminal-form" autocomplete="off">
          <label for="terminal-input" class="terminal-prompt">noah@studio:~$</label>
          <input id="terminal-input" type="text" placeholder="type help" />
        </form>
      </section>
      <footer class="terminal-footer">
        <a href="/integrations.html">integrations</a>
        <a href="/lab.html">lab</a>
        <a href="/notes.html">notes</a>
        <a href="/work.html">work</a>
        <a href="/contact.html">contact</a>
      </footer>
    </main>
    <script src="./terminal-home.js"></script>
  </body>
</html>
