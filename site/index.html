<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noah Lucas</title>
    <style>
      :root {
        --text: #111111;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: #ffffff;
        color: var(--text);
        font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      main {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .wrap {
        width: min(760px, 100%);
        text-align: center;
      }

      .intro {
        margin: 0 auto;
        max-width: 72ch;
      }

      .companies {
        margin-top: 1.2rem;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.8rem;
      }

      .company {
        display: grid;
        justify-items: center;
        align-content: start;
        gap: 0.28rem;
      }

      .logo {
        width: 18px;
        height: 18px;
        object-fit: contain;
        display: block;
        filter: grayscale(1) contrast(1.2) brightness(0.15);
      }

      .name,
      .name:visited,
      .name:hover,
      .name:active {
        color: #707070;
      }

      .name {
        font-size: 11px;
        text-decoration: underline;
        line-height: 1.2;
      }

      .role {
        color: var(--text);
        font-weight: 700;
        font-size: 11px;
        line-height: 1.25;
        max-width: 15ch;
      }

      @media (max-width: 680px) {
        .companies {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 0.9rem 0.6rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="wrap">
        <p class="intro">Noah Lucas: Living in Ojai, California with Sara, Willa, and Bruce the cat. Building a telemetry platform for advanced machines at Sift.</p>

        <div class="companies" aria-label="Company experience">
          <article class="company">
            <img class="logo" src="https://logo.clearbit.com/siftstack.com" alt="Sift logo" loading="lazy" />
            <div class="role">Vice President of Product</div>
            <a class="name" href="https://www.siftstack.com" target="_blank" rel="noopener">Sift</a>
          </article>

          <article class="company">
            <img class="logo" src="https://logo.clearbit.com/anduril.com" alt="Anduril logo" loading="lazy" />
            <div class="role">Principal Product Manager</div>
            <a class="name" href="https://www.anduril.com" target="_blank" rel="noopener">Anduril</a>
          </article>

          <article class="company">
            <img class="logo" src="https://logo.clearbit.com/serverobotics.com" alt="Serve Robotics logo" loading="lazy" />
            <div class="role">Director of Product Management</div>
            <a class="name" href="https://www.serverobotics.com" target="_blank" rel="noopener">Serve Robotics</a>
          </article>

          <article class="company">
            <img class="logo" src="https://logo.clearbit.com/postmates.com" alt="Postmates logo" loading="lazy" />
            <div class="role">Product Lead</div>
            <a class="name" href="https://postmates.com" target="_blank" rel="noopener">Postmates</a>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
