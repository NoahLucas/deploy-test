<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noah Lucas</title>
    <style>
      :root {
        --bg: #f7f7f4;
        --text: #111111;
        --muted: #676767;
        --surface: #ffffff;
        --line: #d9d9d2;
        --ring-a: #6f7fa4;
        --ring-b: #7d9c97;
        --ring-c: #7f7898;
        --aura-a: rgba(111, 127, 164, 0.09);
        --aura-b: rgba(125, 156, 151, 0.08);
        --aura-c: rgba(127, 120, 152, 0.07);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1014;
          --text: #e8ebf2;
          --muted: #9ba4b7;
          --surface: #151923;
          --line: #2a3040;
          --ring-a: #97a8cf;
          --ring-b: #95bcb4;
          --ring-c: #aaa2c8;
          --aura-a: rgba(151, 168, 207, 0.15);
          --aura-b: rgba(149, 188, 180, 0.13);
          --aura-c: rgba(170, 162, 200, 0.12);
        }
      }

      :root[data-theme="light"] {
        --bg: #f7f7f4;
        --text: #111111;
        --muted: #676767;
        --surface: #ffffff;
        --line: #d9d9d2;
        --ring-a: #6f7fa4;
        --ring-b: #7d9c97;
        --ring-c: #7f7898;
        --aura-a: rgba(111, 127, 164, 0.09);
        --aura-b: rgba(125, 156, 151, 0.08);
        --aura-c: rgba(127, 120, 152, 0.07);
      }

      :root[data-theme="dark"] {
        --bg: #0e1014;
        --text: #e8ebf2;
        --muted: #9ba4b7;
        --surface: #151923;
        --line: #2a3040;
        --ring-a: #97a8cf;
        --ring-b: #95bcb4;
        --ring-c: #aaa2c8;
        --aura-a: rgba(151, 168, 207, 0.15);
        --aura-b: rgba(149, 188, 180, 0.13);
        --aura-c: rgba(170, 162, 200, 0.12);
      }

      * { box-sizing: border-box; }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 12px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        transition: background-color 220ms ease, color 220ms ease;
        position: relative;
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: -35vmax;
        pointer-events: none;
        opacity: 0;
        transition: opacity 420ms ease;
      }

      body::before {
        background:
          radial-gradient(44vmax 44vmax at 50% 42%, var(--aura-a), transparent 70%),
          radial-gradient(32vmax 32vmax at 35% 50%, var(--aura-b), transparent 72%);
      }

      body::after {
        background: radial-gradient(38vmax 38vmax at 65% 54%, var(--aura-c), transparent 70%);
      }

      body[data-presence="listening"]::before,
      body[data-presence="thinking"]::before,
      body[data-presence="speaking"]::before {
        opacity: 0.95;
      }

      body[data-presence="thinking"]::after,
      body[data-presence="speaking"]::after {
        opacity: 0.8;
      }

      main {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .wrap {
        width: min(760px, 100%);
        text-align: center;
      }

      .theme-btn {
        position: fixed;
        top: 0.65rem;
        right: 0.75rem;
        z-index: 10;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 0.05em;
        padding: 0.12rem 0.2rem;
        cursor: pointer;
        opacity: 0.62;
        transition: opacity 160ms ease, color 160ms ease;
      }

      .theme-btn:hover {
        opacity: 0.95;
        color: var(--text);
      }

      .intro {
        margin: 0 0 2.9rem;
        width: 100%;
        max-width: none;
        color: var(--text);
        font-size: 13px;
        line-height: 1.52;
        letter-spacing: 0.002em;
      }

      .companies {
        margin-top: 0;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1.35rem 1rem;
      }

      .company {
        display: grid;
        justify-items: center;
        align-content: start;
        gap: 0.22rem;
      }

      .logo-wrap {
        width: 20px;
        height: 20px;
      }

      .logo {
        width: 20px;
        height: 20px;
        object-fit: contain;
        display: block;
      }

      .name,
      .name:visited,
      .name:hover,
      .name:active {
        color: var(--muted);
      }

      .name {
        font-size: 10px;
        text-decoration: none;
        line-height: 1.25;
      }

      .role {
        color: var(--text);
        font-weight: 400;
        font-size: 12px;
        line-height: 1.3;
        max-width: 15ch;
      }

      @media (max-width: 680px) {
        .intro {
          margin-bottom: 2.25rem;
          font-size: 12px;
          line-height: 1.5;
        }

        .companies {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 1.25rem 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <button id="theme-toggle" class="theme-btn" type="button" aria-label="Toggle theme mode">Theme: System</button>
    <main>
      <section class="wrap">
        <p class="intro">Noah Lucas<br />Living in Ojai, California with Sara, Willa, and Bruce the cat.</p>

        <div class="companies" aria-label="Company experience">
          <article class="company">
            <div class="logo-wrap">
              <img class="logo" src="/assets/logos/sift.svg" alt="Sift logo" loading="lazy" onerror="this.style.display='none';" />
            </div>
            <div class="role">Vice President of Product</div>
            <a class="name" href="https://www.siftstack.com" target="_blank" rel="noopener">Sift</a>
          </article>

          <article class="company">
            <div class="logo-wrap">
              <img class="logo" src="/assets/logos/anduril.svg" alt="Anduril logo" loading="lazy" onerror="this.style.display='none';" />
            </div>
            <div class="role">Principal Product Manager</div>
            <a class="name" href="https://www.anduril.com" target="_blank" rel="noopener">Anduril</a>
          </article>

          <article class="company">
            <div class="logo-wrap">
              <img class="logo" src="/assets/logos/serve-robotics.svg" alt="Serve Robotics logo" loading="lazy" onerror="this.style.display='none';" />
            </div>
            <div class="role">Director of Product Management</div>
            <a class="name" href="https://www.serverobotics.com" target="_blank" rel="noopener">Serve Robotics</a>
          </article>

          <article class="company">
            <div class="logo-wrap">
              <img class="logo" src="/assets/logos/postmates.svg" alt="Postmates logo" loading="lazy" onerror="this.style.display='none';" />
            </div>
            <div class="role">Product Lead</div>
            <a class="name" href="https://postmates.com" target="_blank" rel="noopener">Postmates</a>
          </article>
        </div>
      </section>
    </main>

    <script>
      (function () {
        const root = document.documentElement;
        const themeButton = document.getElementById("theme-toggle");
        const themeOptions = ["system", "light", "dark"];

        function getStoredTheme() {
          const saved = localStorage.getItem("nl-theme");
          return themeOptions.includes(saved) ? saved : "system";
        }

        function applyTheme(theme) {
          if (theme === "system") {
            root.removeAttribute("data-theme");
          } else {
            root.setAttribute("data-theme", theme);
          }
          themeButton.textContent = `Theme: ${theme.charAt(0).toUpperCase()}${theme.slice(1)}`;
        }

        let currentTheme = getStoredTheme();
        applyTheme(currentTheme);

        themeButton.addEventListener("click", () => {
          const idx = themeOptions.indexOf(currentTheme);
          currentTheme = themeOptions[(idx + 1) % themeOptions.length];
          localStorage.setItem("nl-theme", currentTheme);
          applyTheme(currentTheme);
        });

        document.body.removeAttribute("data-presence");
      })();
    </script>
  </body>
</html>
