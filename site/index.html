<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noah Lucas</title>
    <style>
      :root {
        --bg: #f7f7f4;
        --text: #111111;
        --muted: #676767;
        --surface: #ffffff;
        --line: #d9d9d2;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1014;
          --text: #e8ebf2;
          --muted: #9ba4b7;
          --surface: #151923;
          --line: #2a3040;
        }
      }

      :root[data-theme="light"] {
        --bg: #f7f7f4;
        --text: #111111;
        --muted: #676767;
        --surface: #ffffff;
        --line: #d9d9d2;
      }

      :root[data-theme="dark"] {
        --bg: #0e1014;
        --text: #e8ebf2;
        --muted: #9ba4b7;
        --surface: #151923;
        --line: #2a3040;
      }

      * { box-sizing: border-box; }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 12px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        transition: background-color 220ms ease, color 220ms ease;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(72vmax 72vmax at 82% 18%, color-mix(in srgb, var(--text) 5%, transparent), transparent 74%),
          radial-gradient(80vmax 80vmax at 12% 84%, color-mix(in srgb, var(--text) 4%, transparent), transparent 78%);
      }

      main {
        min-height: 100%;
        padding: 5.4rem 1rem 3rem;
      }

      .wrap {
        width: min(1200px, 100%);
        margin: 0 auto;
        position: relative;
      }

      .theme-btn {
        position: fixed;
        top: 0.65rem;
        right: 0.75rem;
        z-index: 10;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 14px;
        line-height: 1;
        padding: 0.08rem 0.14rem;
        cursor: pointer;
        opacity: 0.56;
        transition: opacity 160ms ease, color 160ms ease;
      }

      .owner-gate {
        position: fixed;
        left: 0.72rem;
        bottom: 0.7rem;
        z-index: 10;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 11px;
        line-height: 1;
        padding: 0.12rem 0.2rem;
        cursor: pointer;
        opacity: 0.16;
        transition: opacity 140ms ease, color 140ms ease;
      }

      .owner-gate:hover,
      .owner-gate:focus-visible {
        opacity: 0.7;
        color: var(--text);
        outline: none;
      }

      .theme-btn:hover {
        opacity: 0.95;
        color: var(--text);
      }

      .intro {
        margin: 0;
        max-width: min(690px, calc(100% - 390px));
        color: var(--text);
        font-size: 16px;
        line-height: 1.42;
        letter-spacing: 0.01em;
        font-weight: 430;
        text-wrap: balance;
      }

      .timeline {
        width: min(360px, 34vw);
        position: fixed;
        right: clamp(0.9rem, 2.8vw, 2.1rem);
        top: clamp(8rem, 17vh, 11rem);
        padding-right: 2.2rem;
        display: grid;
        gap: 1.06rem;
        text-align: right;
        backdrop-filter: blur(1px);
      }

      .timeline::after {
        content: "";
        position: absolute;
        top: 0.2rem;
        bottom: 0.2rem;
        right: 0.8rem;
        width: 1px;
        background: color-mix(in srgb, var(--text) 20%, transparent);
      }

      .experience {
        position: relative;
      }

      .experience::after {
        content: "";
        position: absolute;
        top: 0.62rem;
        right: -1.73rem;
        width: 9px;
        height: 9px;
        border-radius: 999px;
        border: 1px solid color-mix(in srgb, var(--text) 42%, transparent);
        background: var(--bg);
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--text) 5%, transparent);
      }

      .role {
        color: var(--text);
        font-weight: 520;
        font-size: 13px;
        line-height: 1.22;
      }

      .company,
      .company:visited,
      .company:hover,
      .company:active {
        color: var(--muted);
      }

      .company {
        display: inline-block;
        margin-top: 0.18rem;
        font-size: 11px;
        text-decoration: none;
        line-height: 1.2;
        letter-spacing: 0.02em;
      }

      @media (max-width: 680px) {
        body::before {
          background: radial-gradient(60vmax 60vmax at 50% 10%, color-mix(in srgb, var(--text) 6%, transparent), transparent 82%);
        }

        main {
          padding-top: 4.4rem;
        }

        .intro {
          margin: 0 0 2.35rem;
          max-width: none;
          font-size: 12px;
          line-height: 1.5;
        }

        .timeline {
          width: min(520px, 100%);
          position: relative;
          right: auto;
          top: auto;
          padding-right: 1.9rem;
          gap: 1rem;
        }

        .timeline::after {
          right: 0.56rem;
        }

        .experience::after {
          right: -1.48rem;
          width: 8px;
          height: 8px;
        }
      }
    </style>
  </head>
  <body>
    <button id="theme-toggle" class="theme-btn" type="button" aria-label="Theme mode: system" title="Theme mode: system">◐</button>
    <button id="owner-gate" class="owner-gate" type="button" aria-label="Owner access">◎</button>
    <main>
      <section class="wrap">
        <p class="intro">Noah Lucas<br />Living in Ojai, California with Sara, Willa, and Bruce the cat.</p>

        <section class="timeline" aria-label="Work timeline">
          <article class="experience">
            <div class="role">Vice President of Product</div>
            <a class="company" href="https://www.siftstack.com" target="_blank" rel="noopener">Sift</a>
          </article>

          <article class="experience">
            <div class="role">Principal Product Manager</div>
            <a class="company" href="https://www.anduril.com" target="_blank" rel="noopener">Anduril</a>
          </article>

          <article class="experience">
            <div class="role">Director of Product Management</div>
            <a class="company" href="https://www.serverobotics.com" target="_blank" rel="noopener">Serve Robotics</a>
          </article>

          <article class="experience">
            <div class="role">Product Lead</div>
            <a class="company" href="https://postmates.com" target="_blank" rel="noopener">Postmates</a>
          </article>

          <article class="experience">
            <div class="role">Product</div>
            <a class="company" href="https://www.pendulum.com" target="_blank" rel="noopener">Pendulum</a>
          </article>

          <article class="experience">
            <div class="role">Product</div>
            <a class="company" href="https://www.expedia.com" target="_blank" rel="noopener">Expedia</a>
          </article>

          <article class="experience">
            <div class="role">Product</div>
            <a class="company" href="https://www.spglobal.com/marketintelligence" target="_blank" rel="noopener">S&amp;P Capital IQ</a>
          </article>
        </section>
      </section>
    </main>

    <script>
      (function () {
        const root = document.documentElement;
        const themeButton = document.getElementById("theme-toggle");
        const ownerGate = document.getElementById("owner-gate");
        const themeOptions = ["system", "light", "dark"];

        function getStoredTheme() {
          const saved = localStorage.getItem("nl-theme");
          return themeOptions.includes(saved) ? saved : "system";
        }

        function applyTheme(theme) {
          if (theme === "system") {
            root.removeAttribute("data-theme");
          } else {
            root.setAttribute("data-theme", theme);
          }
          const iconMap = { system: "◐", light: "○", dark: "●" };
          const label = `Theme mode: ${theme}`;
          themeButton.textContent = iconMap[theme] || "◐";
          themeButton.setAttribute("aria-label", label);
          themeButton.setAttribute("title", label);
        }

        let currentTheme = getStoredTheme();
        applyTheme(currentTheme);

        themeButton.addEventListener("click", () => {
          const idx = themeOptions.indexOf(currentTheme);
          currentTheme = themeOptions[(idx + 1) % themeOptions.length];
          localStorage.setItem("nl-theme", currentTheme);
          applyTheme(currentTheme);
        });

        function b64urlToBytes(input) {
          const base64 = input.replace(/-/g, "+").replace(/_/g, "/");
          const padded = base64 + "=".repeat((4 - (base64.length % 4)) % 4);
          const raw = atob(padded);
          const bytes = new Uint8Array(raw.length);
          for (let i = 0; i < raw.length; i += 1) bytes[i] = raw.charCodeAt(i);
          return bytes;
        }

        async function postJSON(path, body, headers = {}) {
          const response = await fetch(path, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json", ...headers },
            body: JSON.stringify(body || {})
          });
          let data = {};
          try {
            data = await response.json();
          } catch (_) {}
          if (!response.ok) {
            const detail = data && data.detail ? data.detail : `${response.status} ${response.statusText}`;
            const err = new Error(detail);
            err.status = response.status;
            throw err;
          }
          return data;
        }

        async function enrollOwnerCredential() {
          const token = window.prompt("Owner setup token");
          if (!token) return false;
          const start = await postJSON("/api/v1/public/admin-auth/webauthn/register/challenge", {}, { "X-Admin-Token": token });
          const credential = await navigator.credentials.create({
            publicKey: {
              challenge: b64urlToBytes(start.challenge),
              rp: start.rp,
              user: {
                id: b64urlToBytes(start.user.id),
                name: start.user.name,
                displayName: start.user.displayName
              },
              pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
              authenticatorSelection: {
                authenticatorAttachment: "platform",
                residentKey: "required",
                userVerification: "required"
              },
              timeout: start.timeout || 60000,
              attestation: "none"
            }
          });
          await postJSON(
            "/api/v1/public/admin-auth/webauthn/register/complete",
            { challenge_id: start.challenge_id, credential_id: credential.id, label: "Owner Passkey" },
            { "X-Admin-Token": token }
          );
          return true;
        }

        async function authenticateOwner() {
          let start;
          try {
            start = await postJSON("/api/v1/public/admin-auth/webauthn/challenge", {});
          } catch (error) {
            if (error.status === 428) {
              const enrolled = await enrollOwnerCredential();
              if (!enrolled) return;
              start = await postJSON("/api/v1/public/admin-auth/webauthn/challenge", {});
            } else {
              throw error;
            }
          }

          const assertion = await navigator.credentials.get({
            publicKey: {
              challenge: b64urlToBytes(start.challenge),
              rpId: start.rp_id || window.location.hostname,
              allowCredentials: (start.allow_credentials || []).map((id) => ({
                type: "public-key",
                id: b64urlToBytes(id)
              })),
              userVerification: "required",
              timeout: start.timeout || 60000
            }
          });

          await postJSON("/api/v1/public/admin-auth/webauthn/verify", {
            challenge_id: start.challenge_id,
            credential_id: assertion.id
          });
          window.location.href = "/ux-live.html";
        }

        ownerGate.addEventListener("click", async () => {
          if (!window.PublicKeyCredential || !navigator.credentials) {
            window.alert("Biometric auth is not available on this device/browser.");
            return;
          }
          ownerGate.disabled = true;
          ownerGate.style.opacity = "0.35";
          try {
            await authenticateOwner();
          } catch (error) {
            window.alert(error && error.message ? error.message : "Owner auth failed.");
          } finally {
            ownerGate.disabled = false;
            ownerGate.style.opacity = "";
          }
        });

      })();
    </script>
  </body>
</html>
