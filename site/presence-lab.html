<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Presence Lab</title>
    <style>
      :root {
        --bg: #f7f6f3;
        --surface: rgba(255, 255, 255, 0.72);
        --line: rgba(18, 18, 18, 0.16);
        --text: #101010;
        --muted: #595959;
        --accent: #7f8aa8;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #06080d;
          --surface: rgba(14, 18, 26, 0.56);
          --line: rgba(222, 227, 241, 0.15);
          --text: #e7eaf2;
          --muted: #9ba5ba;
          --accent: #a3b0d1;
        }
      }

      :root[data-theme="light"] {
        --bg: #f7f6f3;
        --surface: rgba(255, 255, 255, 0.72);
        --line: rgba(18, 18, 18, 0.16);
        --text: #101010;
        --muted: #595959;
        --accent: #7f8aa8;
      }

      :root[data-theme="dark"] {
        --bg: #06080d;
        --surface: rgba(14, 18, 26, 0.56);
        --line: rgba(222, 227, 241, 0.15);
        --text: #e7eaf2;
        --muted: #9ba5ba;
        --accent: #a3b0d1;
      }

      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      }

      canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      .hud {
        position: fixed;
        z-index: 2;
        width: min(880px, calc(100% - 2rem));
        left: 1rem;
        right: 1rem;
        top: 1rem;
        margin: 0 auto;
        border: 1px solid var(--line);
        background: var(--surface);
        backdrop-filter: blur(10px);
        border-radius: 14px;
        padding: 0.75rem 0.8rem;
        display: grid;
        gap: 0.65rem;
      }

      .hud-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      .title {
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .controls {
        display: flex;
        gap: 0.35rem;
        flex-wrap: wrap;
      }

      button,
      select,
      input {
        border: 1px solid var(--line);
        background: transparent;
        color: var(--text);
        font: inherit;
      }

      button,
      select {
        padding: 0.25rem 0.42rem;
        border-radius: 8px;
        font-size: 11px;
        letter-spacing: 0.03em;
      }

      .ghost-link {
        color: var(--muted);
        text-decoration: none;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .active {
        border-color: color-mix(in srgb, var(--accent) 68%, var(--line));
        background: color-mix(in srgb, var(--accent) 12%, transparent);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.45rem;
      }

      .metric {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0.4rem 0.45rem;
      }

      .metric-k {
        font-size: 10px;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .metric-v {
        font-size: 12px;
        margin-top: 0.08rem;
      }

      .command {
        position: fixed;
        z-index: 2;
        width: min(860px, calc(100% - 2rem));
        left: 1rem;
        right: 1rem;
        bottom: 1rem;
        margin: 0 auto;
        border: 1px solid var(--line);
        background: var(--surface);
        backdrop-filter: blur(10px);
        border-radius: 14px;
        padding: 0.6rem;
      }

      .command form {
        display: flex;
        align-items: center;
        gap: 0.45rem;
      }

      .prompt {
        color: var(--accent);
        font-size: 12px;
      }

      .command input {
        flex: 1;
        min-width: 0;
        border-radius: 8px;
        padding: 0.45rem 0.55rem;
      }

      .hint {
        margin-top: 0.35rem;
        color: var(--muted);
        font-size: 11px;
      }

      .meta {
        position: fixed;
        right: 1.1rem;
        bottom: 5.8rem;
        z-index: 2;
        color: var(--muted);
        font-size: 11px;
        text-align: right;
      }

      @media (max-width: 760px) {
        .metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .hud {
          border-radius: 12px;
        }

        .command {
          border-radius: 12px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="field"></canvas>

    <section class="hud" aria-label="Presence controls">
      <div class="hud-top">
        <div class="title">EOS Presence Lab</div>
        <div class="controls">
          <a class="ghost-link" href="/">Home</a>
          <button id="autoBtn" type="button">Auto: Off</button>
          <button id="themeBtn" type="button">Theme: System</button>
          <select id="animalSelect" aria-label="Animal form">
            <option value="none">No Form</option>
            <option value="wolf">Wolf</option>
            <option value="owl">Owl</option>
            <option value="octopus">Octopus</option>
            <option value="raven">Raven</option>
          </select>
        </div>
      </div>

      <div class="controls" id="stateButtons" role="group" aria-label="Presence states">
        <button data-state="idle" type="button" class="active">Idle</button>
        <button data-state="listening" type="button">Listening</button>
        <button data-state="synthesizing" type="button">Synthesizing</button>
        <button data-state="advising" type="button">Advising</button>
        <button data-state="acting" type="button">Acting</button>
      </div>

      <div class="metrics" id="metrics">
        <article class="metric"><div class="metric-k">State</div><div class="metric-v" id="mState">Idle</div></article>
        <article class="metric"><div class="metric-k">Form</div><div class="metric-v" id="mForm">No Form</div></article>
        <article class="metric"><div class="metric-k">Surface</div><div class="metric-v" id="mSurface">Web Focus</div></article>
        <article class="metric"><div class="metric-k">Signal</div><div class="metric-v" id="mSignal">Quiet</div></article>
      </div>
    </section>

    <section class="command" aria-label="Presence command">
      <form id="commandForm">
        <span class="prompt">></span>
        <input
          id="commandInput"
          type="text"
          autocomplete="off"
          placeholder="Try: listen, wolf mode, synthesize, act, return to idle"
        />
      </form>
      <div class="hint">Command channel maps intent to state + form. Future-ready for OpenAI Realtime control.</div>
    </section>

    <div class="meta" id="metaLabel">Render loop live</div>

    <script>
      (() => {
        const VALID_STATES = ["idle", "listening", "synthesizing", "advising", "acting"];
        const VALID_ANIMALS = ["none", "wolf", "owl", "octopus", "raven"];
        const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        const params = new URLSearchParams(window.location.search);
        const initialStateParam = (params.get("state") || "").toLowerCase();
        const initialAnimalParam = (params.get("form") || params.get("animal") || "").toLowerCase();
        const initialAutoParam = (params.get("auto") || "").toLowerCase();

        const themeBtn = document.getElementById("themeBtn");
        const autoBtn = document.getElementById("autoBtn");
        const commandInput = document.getElementById("commandInput");
        const commandForm = document.getElementById("commandForm");
        const stateButtons = Array.from(document.querySelectorAll("#stateButtons button"));
        const animalSelect = document.getElementById("animalSelect");
        const mState = document.getElementById("mState");
        const mForm = document.getElementById("mForm");
        const mSurface = document.getElementById("mSurface");
        const mSignal = document.getElementById("mSignal");
        const metaLabel = document.getElementById("metaLabel");
        const root = document.documentElement;

        const themeOptions = ["system", "light", "dark"];
        let currentTheme = "system";
        const savedTheme = localStorage.getItem("nl-theme");
        if (themeOptions.includes(savedTheme)) currentTheme = savedTheme;

        function applyTheme(theme) {
          if (theme === "system") root.removeAttribute("data-theme");
          else root.setAttribute("data-theme", theme);
          themeBtn.textContent = `Theme: ${theme.charAt(0).toUpperCase()}${theme.slice(1)}`;
          refreshThemeCache();
        }

        applyTheme(currentTheme);
        themeBtn.addEventListener("click", () => {
          const idx = themeOptions.indexOf(currentTheme);
          currentTheme = themeOptions[(idx + 1) % themeOptions.length];
          localStorage.setItem("nl-theme", currentTheme);
          applyTheme(currentTheme);
        });

        const stateConfig = {
          idle: { pull: 0.03, jitter: 0.045, glow: 0.16, speed: 0.9, signal: "Quiet" },
          listening: { pull: 0.065, jitter: 0.08, glow: 0.32, speed: 1.16, signal: "Attentive" },
          synthesizing: { pull: 0.1, jitter: 0.13, glow: 0.45, speed: 1.48, signal: "Integrating" },
          advising: { pull: 0.078, jitter: 0.075, glow: 0.4, speed: 1.28, signal: "Guiding" },
          acting: { pull: 0.122, jitter: 0.16, glow: 0.56, speed: 1.76, signal: "Executing" }
        };

        const animalConfig = {
          none: { spread: 1.0, trails: 0.18, morph: 0.1, label: "No Form" },
          wolf: { spread: 1.4, trails: 0.24, morph: 0.62, label: "Wolf" },
          owl: { spread: 0.9, trails: 0.15, morph: 0.56, label: "Owl" },
          octopus: { spread: 1.55, trails: 0.27, morph: 0.74, label: "Octopus" },
          raven: { spread: 1.2, trails: 0.22, morph: 0.68, label: "Raven" }
        };

        const surfaces = ["Web Focus", "iPhone Context", "Watch Pulse", "Voice Relay", "Ambient Room"];

        let state = VALID_STATES.includes(initialStateParam) ? initialStateParam : "idle";
        let animal = VALID_ANIMALS.includes(initialAnimalParam) ? initialAnimalParam : "none";
        let surfaceIndex = 0;
        let autopilot = initialAutoParam === "1" || initialAutoParam === "true";
        if (reducedMotion) autopilot = false;
        let currentAccentRGB = [163, 176, 209];
        let currentBackground = "#06080d";

        function cssColorToRGB(value) {
          const color = value.trim();
          if (color.startsWith("#")) {
            const hex = color.slice(1);
            const full = hex.length === 3 ? hex.split("").map((c) => c + c).join("") : hex;
            const n = Number.parseInt(full, 16);
            if (!Number.isNaN(n)) {
              return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
            }
          }
          const match = color.match(/rgb[a]?\(([^)]+)\)/i);
          if (match) {
            const parts = match[1].split(",").map((v) => Number.parseFloat(v.trim()));
            if (parts.length >= 3 && parts.every((n) => Number.isFinite(n))) {
              return [parts[0], parts[1], parts[2]];
            }
          }
          return [163, 176, 209];
        }

        function refreshThemeCache() {
          const styles = getComputedStyle(root);
          const accent = styles.getPropertyValue("--accent");
          currentBackground = styles.getPropertyValue("--bg").trim() || currentBackground;
          currentAccentRGB = cssColorToRGB(accent);
        }

        function capitalize(value) {
          return value.charAt(0).toUpperCase() + value.slice(1);
        }

        function syncUI() {
          mState.textContent = capitalize(state);
          mForm.textContent = animalConfig[animal].label;
          mSurface.textContent = surfaces[surfaceIndex];
          mSignal.textContent = stateConfig[state].signal;
          stateButtons.forEach((btn) => btn.classList.toggle("active", btn.dataset.state === state));
          animalSelect.value = animal;
          autoBtn.classList.toggle("active", autopilot);
          autoBtn.textContent = `Auto: ${autopilot ? "On" : "Off"}`;
          metaLabel.textContent = `${capitalize(state)} / ${animalConfig[animal].label} / ${surfaces[surfaceIndex]}`;
        }

        stateButtons.forEach((btn) => {
          btn.addEventListener("click", () => {
            setState(btn.dataset.state);
          });
        });

        animalSelect.addEventListener("change", () => {
          animal = animalSelect.value;
          syncUI();
        });

        autoBtn.addEventListener("click", () => {
          autopilot = !autopilot;
          syncUI();
        });

        function setState(next) {
          if (!VALID_STATES.includes(next)) return;
          state = next;
          syncUI();
        }

        function setAnimal(next) {
          if (!VALID_ANIMALS.includes(next)) return;
          animal = next;
          syncUI();
        }

        function setSurface(next) {
          if (typeof next === "number" && Number.isFinite(next)) {
            surfaceIndex = ((Math.floor(next) % surfaces.length) + surfaces.length) % surfaces.length;
            syncUI();
            return;
          }
          if (typeof next === "string") {
            const idx = surfaces.findIndex((label) => label.toLowerCase() === next.toLowerCase());
            if (idx >= 0) {
              surfaceIndex = idx;
              syncUI();
            }
          }
        }

        commandForm.addEventListener("submit", (event) => {
          event.preventDefault();
          const text = commandInput.value.trim().toLowerCase();
          if (!text) return;
          if (text.includes("idle") || text.includes("rest")) setState("idle");
          if (text.includes("listen")) setState("listening");
          if (text.includes("synth")) setState("synthesizing");
          if (text.includes("advis")) setState("advising");
          if (text.includes("act")) setState("acting");
          if (text.includes("wolf")) setAnimal("wolf");
          if (text.includes("owl")) setAnimal("owl");
          if (text.includes("octo")) setAnimal("octopus");
          if (text.includes("raven")) setAnimal("raven");
          if (text.includes("none") || text.includes("clear")) setAnimal("none");
          if (text.includes("auto")) autopilot = true;
          if (text.includes("manual")) autopilot = false;
          if (text.includes("next surface")) surfaceIndex = (surfaceIndex + 1) % surfaces.length;
          syncUI();
          commandInput.value = "";
        });

        setInterval(() => {
          surfaceIndex = (surfaceIndex + 1) % surfaces.length;
          mSurface.textContent = surfaces[surfaceIndex];
          if (!autopilot) return;
          const loop = (Date.now() / 1000) % 20;
          if (loop < 4) {
            setState("idle");
            setAnimal("none");
          } else if (loop < 8) {
            setState("listening");
            setAnimal("owl");
          } else if (loop < 12) {
            setState("synthesizing");
            setAnimal("octopus");
          } else if (loop < 16) {
            setState("advising");
            setAnimal("raven");
          } else {
            setState("acting");
            setAnimal("wolf");
          }
        }, 5200);

        const canvas = document.getElementById("field");
        const ctx = canvas.getContext("2d");
        const particleCount = reducedMotion ? 170 : 460;
        const particles = [];

        function resize() {
          canvas.width = window.innerWidth * devicePixelRatio;
          canvas.height = window.innerHeight * devicePixelRatio;
          canvas.style.width = `${window.innerWidth}px`;
          canvas.style.height = `${window.innerHeight}px`;
          ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }

        function spawn() {
          particles.length = 0;
          for (let i = 0; i < particleCount; i += 1) {
            particles.push({
              x: Math.random() * window.innerWidth,
              y: Math.random() * window.innerHeight,
              vx: (Math.random() - 0.5) * 0.3,
              vy: (Math.random() - 0.5) * 0.3,
              size: Math.random() * 1.5 + 0.6,
              seed: Math.random() * Math.PI * 2
            });
          }
        }

        function draw(nowMs) {
          const t = nowMs * 0.001;
          const cfg = stateConfig[state];
          const form = animalConfig[animal];
          const w = window.innerWidth;
          const h = window.innerHeight;
          const cx = w * 0.5 + Math.sin(t * 0.12) * w * 0.04;
          const cy = h * 0.5 + Math.cos(t * 0.16) * h * 0.03;

          ctx.clearRect(0, 0, w, h);
          ctx.fillStyle = currentBackground;
          ctx.globalAlpha = 0.98;
          ctx.fillRect(0, 0, w, h);

          const g1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.62);
          g1.addColorStop(0, `rgba(${currentAccentRGB[0]}, ${currentAccentRGB[1]}, ${currentAccentRGB[2]}, ${0.22 + cfg.glow * 0.38})`);
          g1.addColorStop(1, "transparent");
          ctx.globalAlpha = 0.32 + cfg.glow * 0.42;
          ctx.fillStyle = g1;
          ctx.fillRect(0, 0, w, h);

          ctx.globalAlpha = 1;
          for (let i = 0; i < particles.length; i += 1) {
            const p = particles[i];
            const dx = cx - p.x;
            const dy = cy - p.y;
            const d = Math.max(24, Math.hypot(dx, dy));

            const orbit = Math.sin(t * 0.8 + p.seed) * form.morph;
            p.vx += ((dx / d) * cfg.pull * form.spread + (dy / d) * orbit * 0.055);
            p.vy += ((dy / d) * cfg.pull * form.spread - (dx / d) * orbit * 0.055);

            p.vx += (Math.random() - 0.5) * cfg.jitter * (reducedMotion ? 0.018 : 0.028);
            p.vy += (Math.random() - 0.5) * cfg.jitter * (reducedMotion ? 0.018 : 0.028);

            p.vx *= 0.972;
            p.vy *= 0.972;

            p.x += p.vx * cfg.speed;
            p.y += p.vy * cfg.speed;

            if (p.x < -20) p.x = w + 20;
            if (p.x > w + 20) p.x = -20;
            if (p.y < -20) p.y = h + 20;
            if (p.y > h + 20) p.y = -20;

            const alpha = Math.min(0.85, 0.16 + (220 / (d + 80)) * 0.38 + cfg.glow * 0.27);
            ctx.fillStyle = `rgba(220, 228, 245, ${alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
          }

          const ringR = Math.min(w, h) * (0.13 + cfg.glow * 0.08);
          ctx.strokeStyle = `rgba(${currentAccentRGB[0]}, ${currentAccentRGB[1]}, ${currentAccentRGB[2]}, 0.95)`;
          ctx.globalAlpha = 0.2 + cfg.glow * 0.34;
          ctx.lineWidth = 1.1;
          ctx.beginPath();
          ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;

          requestAnimationFrame(draw);
        }

        window.addEventListener("message", (event) => {
          const payload = event && event.data;
          if (!payload || payload.type !== "presence") return;
          if (typeof payload.state === "string") setState(payload.state.toLowerCase());
          if (typeof payload.animal === "string") setAnimal(payload.animal.toLowerCase());
          if (typeof payload.surface === "string" || typeof payload.surface === "number") setSurface(payload.surface);
          if (typeof payload.auto === "boolean") {
            autopilot = payload.auto;
            syncUI();
          }
        });

        window.addEventListener("eos:presence", (event) => {
          const detail = event && event.detail ? event.detail : {};
          if (typeof detail.state === "string") setState(detail.state.toLowerCase());
          if (typeof detail.animal === "string") setAnimal(detail.animal.toLowerCase());
          if (typeof detail.surface === "string" || typeof detail.surface === "number") setSurface(detail.surface);
        });

        window.presenceLab = {
          getState: () => ({ state, animal, surface: surfaces[surfaceIndex], auto: autopilot }),
          setState: (next) => setState(String(next || "").toLowerCase()),
          setAnimal: (next) => setAnimal(String(next || "").toLowerCase()),
          setSurface: (next) => setSurface(next),
          setAuto: (next) => {
            autopilot = Boolean(next);
            syncUI();
          },
          dispatch: (payload) => {
            if (!payload || typeof payload !== "object") return;
            if (payload.state) setState(String(payload.state).toLowerCase());
            if (payload.animal) setAnimal(String(payload.animal).toLowerCase());
            if (payload.surface !== undefined) setSurface(payload.surface);
            if (typeof payload.auto === "boolean") {
              autopilot = payload.auto;
              syncUI();
            }
          }
        };

        window.addEventListener("resize", () => {
          resize();
          spawn();
        });

        resize();
        spawn();
        syncUI();
        requestAnimationFrame(draw);
      })();
    </script>
  </body>
</html>
