<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A living autobiography updated over time from memory, family life, and work." />
    <title>Noah Lucas | Autobiography</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      main.autobio-page {
        width: min(1100px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 4.25rem 0 5rem;
      }

      .autobio-hero {
        display: grid;
        grid-template-columns: minmax(0, 0.95fr) minmax(18rem, 0.7fr);
        gap: 2.4rem;
        align-items: end;
        margin-bottom: 3rem;
      }

      .autobio-kicker {
        display: inline-block;
        margin-bottom: 0.9rem;
        color: var(--muted);
        font-size: 0.76rem;
        letter-spacing: 0.14em;
      }

      .autobio-hero h1 {
        margin: 0;
        max-width: 12ch;
        font-family: "Instrument Serif", serif;
        font-size: clamp(3.4rem, 10vw, 6.9rem);
        line-height: 0.92;
        font-weight: 400;
        letter-spacing: -0.04em;
        color: var(--paper);
      }

      .autobio-hero-copy {
        margin: 0;
        max-width: 30rem;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.8;
      }

      .autobio-frame {
        border-top: 1px solid var(--line);
        display: grid;
        grid-template-columns: 13rem minmax(0, 1fr);
        gap: 2rem;
        padding-top: 1.6rem;
      }

      .autobio-aside {
        display: grid;
        gap: 1.1rem;
        align-content: start;
      }

      .autobio-meta {
        padding-right: 1.2rem;
        border-right: 1px solid var(--line);
      }

      .autobio-meta article + article {
        margin-top: 1rem;
      }

      .autobio-meta .label {
        margin: 0 0 0.32rem;
        color: var(--muted);
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .autobio-meta .value {
        margin: 0;
        color: var(--paper);
        line-height: 1.5;
        word-break: break-word;
      }

      .autobio-note {
        max-width: 44rem;
      }

      .autobio-body {
        color: var(--paper);
      }

      .autobio-body h1,
      .autobio-body h2,
      .autobio-body h3 {
        font-family: "Instrument Serif", serif;
        font-weight: 400;
        color: var(--paper);
        letter-spacing: -0.02em;
      }

      .autobio-body h1 {
        margin: 0 0 1.3rem;
        font-size: clamp(2.2rem, 5vw, 3.4rem);
        line-height: 1;
      }

      .autobio-body h2 {
        margin: 2.3rem 0 0.9rem;
        font-size: clamp(1.6rem, 3vw, 2.15rem);
        line-height: 1.06;
      }

      .autobio-body h3 {
        margin: 1.5rem 0 0.6rem;
        font-size: 1.3rem;
      }

      .autobio-body p,
      .autobio-body li {
        color: var(--paper);
        font-size: 1rem;
        line-height: 1.9;
      }

      .autobio-body p {
        margin: 0 0 1.1rem;
      }

      .autobio-body ul {
        margin: 1rem 0 1.35rem;
        padding-left: 1.3rem;
      }

      .autobio-empty {
        color: var(--muted);
        padding: 1.1rem 0;
      }

      @media (max-width: 900px) {
        .autobio-hero,
        .autobio-frame {
          grid-template-columns: 1fr;
        }

        .autobio-meta {
          border-right: 0;
          padding-right: 0;
          padding-bottom: 1rem;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true"></div>
    <header class="topbar">
      <a class="brand" href="/">Noah Lucas</a>
      <nav>
        <a href="/work.html">Work</a>
        <a href="/autobiography">Autobiography</a>
        <a href="/notes.html">Notes</a>
        <a href="/contact.html">Contact</a>
      </nav>
    </header>

    <main class="autobio-page">
      <section class="autobio-hero reveal">
        <div>
          <span class="autobio-kicker">LIVING AUTOBIOGRAPHY</span>
          <h1>A chapter that keeps up with a real life.</h1>
        </div>
        <p id="autobio-summary" class="autobio-hero-copy">Loading the latest chapter...</p>
      </section>

      <section class="autobio-frame reveal">
        <aside class="autobio-aside">
          <div class="autobio-meta">
            <article><p class="label">Status</p><p class="value">Live</p></article>
            <article><p class="label">Slug</p><p id="autobio-slug" class="value">Loading...</p></article>
            <article><p class="label">Updated</p><p id="autobio-updated" class="value">Loading...</p></article>
          </div>
        </aside>
        <article id="autobio-content" class="autobio-note autobio-body autobio-empty">The living autobiography will appear here once the latest note is available.</article>
      </section>
    </main>

    <footer><p>© <span id="year"></span> Noah Lucas</p></footer>
    <script src="../ui.js"></script>
    <script src="../autobiography.js"></script>
  </body>
</html>
