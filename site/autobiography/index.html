<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A living autobiography updated over time from memory, family life, and work." />
    <title>Noah Lucas | Autobiography</title>
    <style>
      :root {
        --bg: #f7f7f4;
        --text: #111111;
        --muted: #676767;
        --surface: #ffffff;
        --line: #d9d9d2;
        --glow-a: color-mix(in srgb, var(--text) 5%, transparent);
        --glow-b: color-mix(in srgb, var(--text) 4%, transparent);
        --mist-a: transparent;
        --mist-b: transparent;
        --firefly-a: transparent;
        --firefly-b: transparent;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1014;
          --text: #e8ebf2;
          --muted: #9ba4b7;
          --surface: #151923;
          --line: #2a3040;
          --glow-a: color-mix(in srgb, var(--text) 6%, transparent);
          --glow-b: color-mix(in srgb, var(--text) 5%, transparent);
          --mist-a: transparent;
          --mist-b: transparent;
          --firefly-a: transparent;
          --firefly-b: transparent;
        }
      }

      :root[data-theme="light"] {
        --bg: #f7f7f4;
        --text: #111111;
        --muted: #676767;
        --surface: #ffffff;
        --line: #d9d9d2;
        --glow-a: color-mix(in srgb, var(--text) 5%, transparent);
        --glow-b: color-mix(in srgb, var(--text) 4%, transparent);
        --mist-a: transparent;
        --mist-b: transparent;
        --firefly-a: transparent;
        --firefly-b: transparent;
      }

      :root[data-theme="dark"] {
        --bg: #0e1014;
        --text: #e8ebf2;
        --muted: #9ba4b7;
        --surface: #151923;
        --line: #2a3040;
        --glow-a: color-mix(in srgb, var(--text) 6%, transparent);
        --glow-b: color-mix(in srgb, var(--text) 5%, transparent);
        --mist-a: transparent;
        --mist-b: transparent;
        --firefly-a: transparent;
        --firefly-b: transparent;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 12px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        transition: background-color 220ms ease, color 220ms ease;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(72vmax 72vmax at 82% 18%, var(--glow-a), transparent 74%),
          radial-gradient(80vmax 80vmax at 12% 84%, var(--glow-b), transparent 78%);
        transition: background 700ms ease;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(58vmax 30vmax at 50% 104%, var(--mist-a), transparent 72%),
          radial-gradient(42vmax 22vmax at 52% 18%, var(--mist-b), transparent 75%),
          radial-gradient(0.55rem 0.55rem at 22% 68%, var(--firefly-a), transparent 72%),
          radial-gradient(0.42rem 0.42rem at 76% 61%, var(--firefly-b), transparent 72%),
          radial-gradient(0.35rem 0.35rem at 64% 74%, var(--firefly-a), transparent 70%);
        opacity: 0.42;
        transition: background 900ms ease, opacity 500ms ease;
      }

      main {
        width: min(1240px, calc(100% - 2.6rem));
        margin: 0 auto;
        padding: 5.4rem 0 3rem;
      }

      .theme-btn {
        position: fixed;
        top: 0.65rem;
        right: 0.75rem;
        z-index: 10;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 14px;
        line-height: 1;
        padding: 0.08rem 0.14rem;
        cursor: pointer;
        opacity: 0.56;
        transition: opacity 160ms ease, color 160ms ease;
      }

      .theme-btn:hover,
      .theme-btn:focus-visible {
        opacity: 0.95;
        color: var(--text);
        outline: none;
      }

      .home-link,
      .home-link:visited,
      .home-link:hover,
      .home-link:active {
        color: var(--muted);
      }

      .home-link {
        position: fixed;
        left: 0.9rem;
        top: 0.72rem;
        z-index: 10;
        font-size: 11px;
        text-decoration: none;
        letter-spacing: 0.01em;
      }

      .page-grid {
        display: grid;
        grid-template-columns: minmax(180px, 220px) minmax(0, 1fr);
        column-gap: clamp(2.2rem, 5vw, 5.6rem);
        align-items: start;
      }

      .meta-rail {
        position: relative;
        padding-right: 1.25rem;
      }

      .meta-rail::after {
        content: "";
        position: absolute;
        top: 0.15rem;
        bottom: 0.15rem;
        right: 0;
        width: 1px;
        background: color-mix(in srgb, var(--text) 18%, transparent);
      }

      .meta-block + .meta-block {
        margin-top: 1.25rem;
      }

      .meta-label {
        margin: 0 0 0.18rem;
        color: var(--muted);
        font-size: 10.5px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .meta-value {
        margin: 0;
        color: var(--text);
        font-size: 12px;
        line-height: 1.4;
        word-break: break-word;
      }

      .story-column {
        min-width: 0;
      }

      .eyebrow {
        margin: 0 0 0.8rem;
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .page-title {
        margin: 0;
        max-width: 11ch;
        font-size: clamp(34px, 7vw, 64px);
        line-height: 0.96;
        letter-spacing: -0.045em;
        font-weight: 520;
      }

      .lede {
        margin: 1rem 0 0;
        max-width: 34rem;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.65;
      }

      .story-frame {
        margin-top: 2rem;
        padding-top: 1.2rem;
        border-top: 1px solid color-mix(in srgb, var(--text) 14%, transparent);
        max-width: 44rem;
      }

      .autobio-body {
        color: var(--text);
      }

      .autobio-body h1,
      .autobio-body h2,
      .autobio-body h3 {
        color: var(--text);
        font-weight: 520;
        letter-spacing: -0.03em;
      }

      .autobio-body h1 {
        margin: 0 0 1.1rem;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1;
      }

      .autobio-body h2 {
        margin: 2.2rem 0 0.7rem;
        font-size: clamp(18px, 3vw, 26px);
        line-height: 1.1;
      }

      .autobio-body h3 {
        margin: 1.5rem 0 0.55rem;
        font-size: 17px;
        line-height: 1.2;
      }

      .autobio-body p,
      .autobio-body li {
        margin: 0 0 0.95rem;
        color: var(--text);
        font-size: 15px;
        line-height: 1.75;
      }

      .autobio-body ul {
        margin: 0.4rem 0 1.2rem;
        padding-left: 1.1rem;
      }

      .autobio-empty {
        color: var(--muted);
      }

      @media (max-width: 860px) {
        main {
          width: min(100%, calc(100% - 1.9rem));
          padding: 4.75rem 0 2.6rem;
        }

        .page-grid {
          grid-template-columns: 1fr;
          row-gap: 1.4rem;
        }

        .meta-rail {
          padding-right: 0;
          padding-bottom: 1rem;
          border-bottom: 1px solid color-mix(in srgb, var(--text) 14%, transparent);
        }

        .meta-rail::after {
          display: none;
        }

        .meta-rail {
          display: grid;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 1rem;
        }

        .meta-block + .meta-block {
          margin-top: 0;
        }

        .page-title {
          max-width: 9.5ch;
        }
      }

      @media (max-width: 560px) {
        .meta-rail {
          grid-template-columns: 1fr;
          gap: 0.8rem;
        }

        .lede,
        .autobio-body p,
        .autobio-body li {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <a class="home-link" href="/">Home</a>
    <button id="theme-toggle" class="theme-btn" type="button" aria-label="Theme mode: system" title="Theme mode: system">◐</button>
    <main>
      <section class="page-grid">
        <aside class="meta-rail" aria-label="Autobiography metadata">
          <div class="meta-block">
            <p class="meta-label">Status</p>
            <p class="meta-value">Live</p>
          </div>
          <div class="meta-block">
            <p class="meta-label">Slug</p>
            <p id="autobio-slug" class="meta-value">Loading...</p>
          </div>
          <div class="meta-block">
            <p class="meta-label">Updated</p>
            <p id="autobio-updated" class="meta-value">Loading...</p>
          </div>
        </aside>

        <section class="story-column">
          <p class="eyebrow">Living Autobiography</p>
          <h1 class="page-title">A record that keeps pace with a real life.</h1>
          <p id="autobio-summary" class="lede">Loading the latest chapter...</p>
          <article id="autobio-content" class="story-frame autobio-body autobio-empty">
            The living autobiography will appear here once the latest note is available.
          </article>
        </section>
      </section>
    </main>

    <script>
      (function () {
        const root = document.documentElement;
        const themeButton = document.getElementById("theme-toggle");
        const themeOptions = ["system", "light", "dark"];

        function getStoredTheme() {
          const saved = localStorage.getItem("nl-theme");
          return themeOptions.includes(saved) ? saved : "system";
        }

        function applyTheme(theme) {
          if (theme === "system") {
            root.removeAttribute("data-theme");
          } else {
            root.setAttribute("data-theme", theme);
          }
          const iconMap = { system: "◐", light: "○", dark: "●" };
          const label = "Theme mode: " + theme;
          themeButton.textContent = iconMap[theme] || "◐";
          themeButton.setAttribute("aria-label", label);
          themeButton.setAttribute("title", label);
        }

        function cycleTheme() {
          const current = getStoredTheme();
          const next = themeOptions[(themeOptions.indexOf(current) + 1) % themeOptions.length];
          localStorage.setItem("nl-theme", next);
          applyTheme(next);
        }

        themeButton.addEventListener("click", cycleTheme);
        applyTheme(getStoredTheme());
      })();
    </script>
    <script src="../autobiography.js"></script>
  </body>
</html>
