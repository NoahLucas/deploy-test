const PASS_HASH="f226a9d29cdb97d342436fe240a05ca06bb3cb037025874347b5ae06f1bf963b";
async function sha256(str){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function getAuth(){try{return sessionStorage.getItem("radar_auth")==="1";}catch(e){return false;}}
function setAuth(){try{sessionStorage.setItem("radar_auth","1");}catch(e){}}

function AuthGate({children}){
  const[ok,setOk]=useState(getAuth);
  const[pw,setPw]=useState("");
  const[err,setErr]=useState(false);
  const[checking,setChecking]=useState(false);
  const inputRef=useRef(null);
  useEffect(()=>{if(!ok&&inputRef.current)inputRef.current.focus();},[ok]);
  async function check(){
    setChecking(true);setErr(false);
    const h=await sha256(pw);
    if(h===PASS_HASH){setAuth();setOk(true);}
    else{setErr(true);setPw("");setTimeout(()=>setErr(false),2000);}
    setChecking(false);
  }
  if(ok)return children;
  const dk=typeof window!=="undefined"&&window.matchMedia("(prefers-color-scheme:dark)").matches;

  const border=dk?"rgba(150,148,144,0.12)":"rgba(80,78,72,0.14)";
  const red=dk?"#e03020":"#c00000";
  const mono="'IBM Plex Mono','JetBrains Mono','Fira Code',ui-monospace,monospace";
  const sf="'IBM Plex Sans',-apple-system,system-ui,sans-serif";
  return(
    <div style={{width:"100vw",height:"100dvh",background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:sf}}>
      <div style={{width:320,display:"flex",flexDirection:"column",alignItems:"center",gap:24}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:28}}>{"📡"}</span>
          <span style={{fontSize:15,fontWeight:700,letterSpacing:"0.15em",fontFamily:mono,color:fg}}>RADAR</span>
        </div>
        <p style={{fontSize:12,color:fg2,textAlign:"center",fontFamily:sf}}>Rapid Analysis, Decision And Response</p>
        <div style={{width:"100%",display:"flex",gap:8}}>
          <input ref={inputRef} type="password" value={pw} onChange={e=>setPw(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&pw)check();}}
            placeholder="Password"
            style={{flex:1,padding:"12px 14px",borderRadius:12,border:"0.5px solid "+(err?red:border),
              background:fill,color:fg,fontFamily:mono,fontSize:13,outline:"none",
              transition:"border-color 0.2s"}}/>
          <button onClick={check} disabled={!pw||checking}
            style={{padding:"12px 20px",borderRadius:12,border:"none",cursor:pw?"pointer":"default",

              background:pw?accent:fill,color:pw?"#fff":fg3,

        {err&&<p style={{fontSize:11,color:red,fontFamily:mono,animation:"fadeIn 0.2s ease"}}>Wrong password</p>}
      </div>
    </div>
  );
}

async function slackDraft({message,target,channelKey}){
  const ch=CH[channelKey]; if(!ch) throw new Error("Unknown channel");
  const isCh=ch.label.startsWith("#");
  const inst=ch.sid
    ? `Create a Slack draft in channel ${ch.sid}. Do not modify the message.`
    : isCh ? `Find Slack channel "${ch.label.replace("#","")}",create draft. Do not modify.`
    : `Find Slack user "${target||ch.label}",create draft DM. Do not modify.`;
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json","anthropic-beta":"mcp-client-2025-11-20"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",max_tokens:1000,
      system:'You are a Slack routing agent. Find target, create draft. Never modify message. Respond ONLY: {"success":true,"channel_link":"<url>"} or {"success":false,"error":"<reason>"}',
      messages:[{role:"user",content:`${inst}\n\nMessage:\n${message}`}],
      mcp_servers:[{type:"url",url:"https://mcp.slack.com/mcp",name:"slack"}],
      tools:[{type:"mcp_toolset",mcp_server_name:"slack"}],
    }),
  });
  if(!r.ok) throw new Error(`API ${r.status}`);
  return parseSlack(await r.json());
}

function parseSlack(d){
  const txts=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const fUrl=s=>s.match(/https:\/\/app\.slack\.com\/[^\s"')\\]+/)?.[0]||null;
  try{const m=txts.match(/\{[\s\S]*?"success"[\s\S]*?\}/);
    if(m){const r=JSON.parse(m[0]);return{ok:r.success!==false,link:r.channel_link||null,err:r.error||null};}
  }catch{}
  const tools=(d.content||[]).filter(b=>b.type==="mcp_tool_result");
  if(tools.length)return{ok:true,link:fUrl(JSON.stringify(tools)),err:null};
  if(txts&&!/error|failed/i.test(txts))return{ok:true,link:fUrl(txts),err:null};
  return{ok:false,link:null,err:txts||"Unknown"};
}

async function clip(text){
  try{await navigator.clipboard.writeText(text);return true;}catch{
    const t=document.createElement("textarea");t.value=text;t.style.cssText="position:fixed;opacity:0";
    document.body.appendChild(t);t.select();
    try{document.execCommand("copy");document.body.removeChild(t);return true;}
    catch{document.body.removeChild(t);return false;}
  }
}

var LIVE_DATA=null;

var SERVER_URL=null; // Set to "http://localhost:3001" when server is running
var _ws=null;
var _stateVersion=0;
var _onPatch=null; // Set by React app to trigger re-renders

// Detect if server is available
async function _detectServer(){
  if(SERVER_URL) return SERVER_URL;
  // Try common local ports
  for(var port of [3001,3000,8080]){
    try{
      var r=await fetch("http://localhost:"+port+"/api/health",{signal:AbortSignal.timeout(500)});
      if(r.ok){SERVER_URL="http://localhost:"+port;console.log("[radar] Server found at "+SERVER_URL);return SERVER_URL;}
    }catch(e){}
  }
  return null;
}

// WebSocket connection for live patches
function _connectWS(){
  if(!SERVER_URL||_ws)return;
  var wsUrl=SERVER_URL.replace("http","ws")+"/ws";
  try{
    _ws=new WebSocket(wsUrl);
    _ws.onmessage=function(e){
      try{
        var msg=JSON.parse(e.data);
        if(msg.type==="connected"){
          _stateVersion=msg.version;
          console.log("[ws] Connected, version "+_stateVersion);
        }else if(msg.path&&LIVE_DATA){
          // Apply patch to LIVE_DATA
          _applyPatch(LIVE_DATA,msg.path,msg.value);
          _stateVersion=msg.version||_stateVersion+1;
          if(_onPatch)_onPatch(msg);
        }
      }catch(err){console.warn("[ws] Parse error:",err);}
    };
    _ws.onclose=function(){_ws=null;setTimeout(_connectWS,5000);};
    _ws.onerror=function(){_ws=null;};
  }catch(e){console.warn("[ws]",e.message);}
}

function _applyPatch(obj,path,value){
  var parts=path.split(".");
  var target=obj;
  for(var i=0;i<parts.length-1;i++){
    var k=isNaN(parts[i])?parts[i]:parseInt(parts[i]);
    if(!target[k])target[k]={};
    target=target[k];
  }
  var last=isNaN(parts[parts.length-1])?parts[parts.length-1]:parseInt(parts[parts.length-1]);
  target[last]=value;
}

async function loadData(){
  try{
    // Try server first
    var serverUrl=await _detectServer();
    if(serverUrl){
      var r=await fetch(serverUrl+"/api/state");
      if(r.ok){
        var resp=await r.json();
        LIVE_DATA=resp.data;
        _stateVersion=resp.version;
        _connectWS();
        console.log("[radar] Loaded from server, version "+_stateVersion);
        return LIVE_DATA;
      }
    }
    // Fallback to static data.json
    var r=await fetch(DATA_URL);
    if(!r.ok) throw new Error("HTTP "+r.status);
    LIVE_DATA=await r.json();
    // Post-process: make timeAudit relative to today
    if(LIVE_DATA.timeAudit&&LIVE_DATA.timeAudit.today){
      LIVE_DATA.timeAudit.today.date=new Date().toISOString().slice(0,10);
    }
    // Post-process: make timeline event dates relative to today
    if(LIVE_DATA.timeline&&LIVE_DATA.timeline.sections){
      var dataDate=new Date("2026-03-03T12:00:00");
      var realToday=new Date();realToday.setHours(12,0,0,0);
      var offsetMs=realToday.getTime()-dataDate.getTime();
      var offsetDays=Math.round(offsetMs/86400000);
      if(offsetDays!==0){
        LIVE_DATA.timeline.sections.forEach(function(sec){
          if(sec.events)sec.events.forEach(function(ev){
            if(ev.date){
              var d=new Date(ev.date+"T12:00:00");
              d.setDate(d.getDate()+offsetDays);
              ev.date=d.toISOString().slice(0,10);
            }
          });
        });
      }
    }
    // Post-process: make Slack timestamps relative
    if(LIVE_DATA.team){
      var slackBase=new Date("2026-03-03T12:00:00").getTime();
      var nowMs=Date.now();
      var slackOff=nowMs-slackBase;
      LIVE_DATA.team.forEach(function(person){
        if(person.slackLastSeen){
          var t=new Date(person.slackLastSeen).getTime()+slackOff;
          person.slackLastSeen=new Date(t).toISOString();
        }
      });
    }
    // Post-process: make cofounder timestamps relative
    if(LIVE_DATA.cofounders){
      var cfBase=new Date("2026-03-03T12:00:00").getTime();
      var cfOff=Date.now()-cfBase;
      LIVE_DATA.cofounders.forEach(function(cf){
        if(cf.lastSlackToNoah){
          var t=new Date(cf.lastSlackToNoah).getTime()+cfOff;
          cf.lastSlackToNoah=new Date(t).toISOString();
        }
      });
    }
    console.log("[radar] Loaded from static data.json (server not available)");
    return LIVE_DATA;
  }catch(e){
    console.error("Failed to load data:",e);
    return null;
  }
}

function tryParse(s){
  try{return JSON.parse(s);}catch(e){return null;}
}

function extractInsightsFromPartial(text){
  var clean=text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
  var fixed=clean.replace(/,\s*([}\]])/g,"$1");
  // Try extracting individual insight objects using balanced brace matching
  var results=[];
  var inArr=fixed.indexOf("[");
  if(inArr<0) return results;
  var sub=fixed.slice(inArr+1);
  var depth=0; var start=-1;
  for(var ci=0;ci<sub.length;ci++){
    if(sub[ci]==="{"){if(depth===0)start=ci;depth++;}
    if(sub[ci]==="}"){depth--;if(depth===0&&start>=0){
      var chunk=sub.slice(start,ci+1);
      var obj=tryParse(chunk);
      if(obj&&obj.headline) results.push(obj);
      start=-1;
    }}
  }
  return results;
}

function robustParseFinal(text){
  var clean=text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
  if(!clean||clean.length===0) return{insights:[]};
  var parsed=tryParse(clean);
  if(parsed) return parsed;
  var fixed=clean.replace(/,\s*([}\]])/g,"$1");
  parsed=tryParse(fixed);
  if(parsed) return parsed;
  var m=fixed.match(/\{[\s\S]*"insights"\s*:\s*\[[\s\S]*\]\s*\}/);
  if(m){parsed=tryParse(m[0]);if(parsed)return parsed;}
  m=fixed.match(/"insights"\s*:\s*(\[[\s\S]*\])/);
  if(m){var arr=tryParse(m[1]);if(arr)return{insights:arr};}
  m=fixed.match(/\[[\s\S]*\]/);
  if(m){var arr2=tryParse(m[0]);if(arr2)return{insights:arr2};}
  var fixed2=fixed.replace(/":\s*"[^"]*\n/g,function(m){return m.replace(/\n/g,"\\n");});
  parsed=tryParse(fixed2);
  if(parsed) return parsed;
  // Last resort: extract whatever individual objects we can
  var partial=extractInsightsFromPartial(text);
  if(partial.length>0) return{insights:partial};
  throw new Error("Parse failed (len="+clean.length+"): "+clean.slice(0,200));
}

function compactData(data){
  var c=JSON.parse(JSON.stringify(data));
  function tail(arr,n){if(!arr)return arr;return arr.slice(-(n||7));}
  if(c.amplitude){
    var a=c.amplitude;
    if(a.dau){a.dau.dates=tail(a.dau.dates);a.dau.values=tail(a.dau.values);delete a.dau.chart;}

    if(a.featureAdoption){a.featureAdoption.weeks=tail(a.featureAdoption.weeks);a.featureAdoption.explore=tail(a.featureAdoption.explore);a.featureAdoption.rules=tail(a.featureAdoption.rules);a.featureAdoption.reports=tail(a.featureAdoption.reports);a.featureAdoption.runs=tail(a.featureAdoption.runs);delete a.featureAdoption.chart;}
    if(a.collaboration){a.collaboration.weeks=tail(a.collaboration.weeks);a.collaboration.shareIcon=tail(a.collaboration.shareIcon);a.collaboration.annotationCreate=tail(a.collaboration.annotationCreate);a.collaboration.shareLinkViewed=tail(a.collaboration.shareLinkViewed);delete a.collaboration.chart;}
    if(a.engagement){a.engagement.weeks=tail(a.engagement.weeks);a.engagement.annotationCreate=tail(a.engagement.annotationCreate);a.engagement.calcChannel=tail(a.engagement.calcChannel);a.engagement.chartShare=tail(a.engagement.chartShare);delete a.engagement.chart;}
    if(a.keyActions)delete a.keyActions.chart;
    if(a.retention)delete a.retention.chart;
  }
  return c;
}

async function synthesizeStreaming(data, onInsight, onProgress){
  var t0=Date.now();
  onProgress("Connecting to synthesis engine...");
  var compact=compactData(data);
  var customPrompt="";
  try{customPrompt=window.__RADAR_CUSTOM_PROMPT||getCustomPrompt()||"";}catch(e){}
  var defaultPrompt="You are RADAR, a proactive product intelligence engine for an aerospace/defense telemetry observability platform. The user is Noah, VP of Product.\n\nYou are given a data.json containing signals from 5+ sources (Amplitude, Slack, Linear, Calendar, Google Docs). Your job is to synthesize ALL signals \u2014 not just the top few.\n\nCRITICAL RULES:\n1. SURFACE 10-15 items minimum. Every signal in the data deserves evaluation. If the input has 15 signals, you should produce at least 12 items. Do NOT over-filter.\n2. VALIDATE COVERAGE: Before responding, audit your output. Every data source (amplitude, slack, linear, calendar) must be represented. If a source has signals you did not surface, add them.\n3. PRESERVE EVIDENCE: Each signal in the input may have an 'evidence' array with real URLs. Copy these into your output exactly \u2014 they are pre-validated clickable links.\n4. ASK THE RIGHT QUESTIONS: Include one final item with id 'meta-questions' and category 'blind_spot' that lists 2-3 questions Noah should be asking that the data does NOT answer. Frame as 'What RADAR can\u2019t see from this data.'\n\nCategories:\n\u2022 INSIGHT \u2014 data anomaly or pattern needing attention\n\u2022 PREP \u2014 meeting/event within 24h needing briefing\n\u2022 NUDGE \u2014 person to message, thank, unblock, follow up with\n\u2022 LEVERAGE \u2014 force multiplier: delegate, automate, connect dots\n\u2022 BLIND SPOT \u2014 stale issues, silent customers, forgotten commitments, coverage gaps\n\u2022 MOMENTUM \u2014 wins to celebrate or amplify\n\nMix categories. At least 2 NUDGE, 2 LEVERAGE, and 2 BLIND SPOT items.\n\nCustomers: K2 Space, Astranis, Reliable Robotics, Varda, Heart Aerospace, Orbital Ops, Parallel Systems, Inversion Space, The Exploration Company, OHB, Lockheed Martin, Dust Moto.\n\nRESPOND WITH ONLY VALID JSON \u2014 no markdown fences:\n{\"insights\":[{\"id\":\"<unique>\",\"category\":\"insight|prep|nudge|leverage|blind_spot|momentum\",\"headline\":\"<sharp, max 60 chars>\",\"body\":\"<2-3 sentence summary>\",\"action\":\"<ready-to-paste next step>\",\"situation\":\"<what is happening>\",\"whyItMatters\":\"<consequence if ignored>\",\"recommendation\":\"<specific next move>\",\"recTarget\":\"-> <TARGET>\",\"priority\":\"URGENT|HIGH|MEDIUM|LOW\",\"sources\":[\"amplitude\",\"slack\",\"linear\",\"calendar\"],\"actionType\":\"message|escalate|celebrate|delegate|prep\",\"actionTarget\":\"<person or channel>\",\"channelKey\":\"<gui|account-owner|shiproom|jared|fde-heart|benji|all-hands|product>\",\"sparkline\":[7 numbers 0-100],\"evidence\":[{\"label\":\"<what>\",\"url\":\"<REAL url from input data>\",\"source\":\"<src>\"}],\"context\":{\"metric\":\"<number>\",\"delta\":\"<change>\",\"baseline\":\"<comparison>\",\"risk\":\"<level>\"},\"feeds\":[{\"source\":\"<src>\",\"chart\":\"<id>\",\"freshness\":\""+data.fetchedAt+"\"}]}]}\n\nPriority: URGENT=revenue at risk/security hole/customer blocked, HIGH=action today, MEDIUM=this week, LOW=positive/FYI\nCategory guidance: PREP for meetings within 24h. NUDGE for people waiting on you. LEVERAGE for things to delegate or connect. BLIND SPOT for items >5 days stale or customers gone quiet.\n\nIMPORTANT: Preserve all evidence URLs from the input signals. Do not fabricate URLs. If the input signal has evidence[].url values, copy them exactly into your output.";
  var systemPrompt=customPrompt||defaultPrompt;
  var r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-haiku-4-5-20251001",max_tokens:4096,stream:true,
      system:systemPrompt,
      messages:[{role:"user",content:"Synthesize ALL signals into actionable items. There are "+((data.signals||[]).length)+" input signals \u2014 produce at least 10 items. Preserve evidence URLs.\n\n"+JSON.stringify(compact)}],
    }),
  });
  if(!r.ok){
    var errBody=await r.text().catch(function(){return"";});
    throw new Error("API "+r.status+": "+errBody.slice(0,200));
  }
  var reader=r.body.getReader();
  var decoder=new TextDecoder();
  var fullText="";
  var lastYielded=0;
  var buffer="";
  onProgress("Scanning sources...");
  while(true){
    var chunk=reader.read();
    var result=await chunk;
    if(result.done) break;
    buffer+=decoder.decode(result.value,{stream:true});
    var evts=buffer.split("\n");
    buffer=evts.pop()||"";
    for(var ei=0;ei<evts.length;ei++){
      var line=evts[ei];
      if(!line.startsWith("data: "))continue;
      var payload=line.slice(6);
      if(payload==="[DONE]")continue;
      var evt=tryParse(payload);
      if(!evt)continue;
      if(evt.type==="content_block_delta"&&evt.delta&&evt.delta.text){
        fullText+=evt.delta.text;
        var partial=extractInsightsFromPartial(fullText);
        if(partial.length>lastYielded){
          for(var ni=lastYielded;ni<partial.length;ni++){
            onInsight(partial[ni],ni);
          }
          lastYielded=partial.length;
          onProgress(lastYielded+" item"+(lastYielded>1?"s":"")+" found...");
        }
      }
    }
  }
  var dur=((Date.now()-t0)/1000).toFixed(0);
  // Final parse for complete data
  var final=robustParseFinal(fullText);
  onProgress("Done \u2014 "+dur+"s");
  return{insights:final.insights||[],meta:{duration:dur,errors:[],sourcesOk:3}};
}

// --- Evidence label derivation ---
function evLabel(ev){
  if(ev.label&&ev.label.trim())return ev.label.trim();
  var srcName=SVC[ev.source]?.label||ev.source||"";
  if(!ev.url)return srcName||"Link";
  try{
    var u=new URL(ev.url);var host=u.hostname.replace(/^www\./,"");var path=u.pathname.split("/").filter(Boolean);
    if(host.includes("amplitude")){if(path.includes("chart"))return srcName+": Chart "+path.slice(-1)[0];if(path.includes("dashboard"))return srcName+": Dashboard";return srcName+(path.length>2?": "+path.slice(-1)[0]:"")}
    if(host.includes("linear")){var last=path.slice(-1)[0]||"";if(/^[A-Z]+-\d+$/.test(last))return last;return srcName+(last?": "+last:"")}
    if(host.includes("slack"))return srcName+": thread";
    if(host.includes("docs.google"))return"Google Doc";
    if(host.includes("calendar.google"))return srcName+": event";
    if(host.includes("granola"))return srcName+": meeting notes";
    if(host.includes("gmail"))return"Gmail: message";
    if(path.length>0){var seg=decodeURIComponent(path.slice(-1)[0]).replace(/[-_]/g," ");return seg.length>30?seg.slice(0,28)+"\u2026":seg}
    return srcName||host.replace(/\.com$|\.io$|\.app$/,"")||"Link";
  }catch(e){return srcName||"Link"}
}

      display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden",paddingLeft:S[4]-1}}>

// CUSTOMERS VIEW
// ═══════════════════════════════════════════════════════════
function CustomersView({p,dk}){
  const[customers,setCustomers]=useState([]);
  useEffect(()=>{if(LIVE_DATA?.customers)setCustomers(LIVE_DATA.customers);else loadData().then(()=>{if(LIVE_DATA?.customers)setCustomers(LIVE_DATA.customers)})},[]);
  function tC(t){return t==="expanding"?p.green:t==="stable"?p.blue:t==="at-risk"?p.orange:t==="contracting"?p.red:p.gray}
  function tI(t){return t==="expanding"?"\u2197":t==="stable"?"\u2192":t==="at-risk"?"\u26A0":t==="contracting"?"\u2198":"\u2014"}
  if(!customers.length)return <div style={{padding:S[8],textAlign:"center",color:p.label4,fontFamily:MONO,fontSize:T.sm}}>No customer data</div>;
  var sorted=[...customers].sort((a,b)=>{var o={"contracting":0,"at-risk":1,stable:2,expanding:3};return(o[a.trajectory]||2)-(o[b.trajectory]||2)||(b.wau||0)-(a.wau||0)});
  return <div style={{display:"flex",flexDirection:"column",gap:S[2],padding:S[4]}}>
    {sorted.map(c=><div key={c.name} style={{...card(p),padding:S[4]}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:S[2]}}>
        <div style={{display:"flex",alignItems:"center",gap:S[2]}}>
          <span style={{color:tC(c.trajectory),fontSize:T.sm}}>{tI(c.trajectory)}</span>
          <span style={{fontSize:T.base,fontWeight:600,fontFamily:SYNE,color:p.label}}>{c.name}</span>
        </div>
        <span style={{fontSize:T.xs,fontFamily:MONO,color:p.label3}}>{c.wau||0} WAU</span>
      </div>
      {c.topSignal&&<p style={{fontSize:T.sm,color:p.label2,fontFamily:SF,lineHeight:1.5,marginBottom:S[2]}}>{c.topSignal}</p>}
      <div style={{display:"flex",gap:S[2],fontSize:T.xs,fontFamily:MONO,color:p.label3,flexWrap:"wrap"}}>
        {c.features?.slice(0,4).map((f,i)=><span key={i} style={{padding:"1px 5px",borderRadius:R.sm,background:p.fill4}}>{f}</span>)}
        {c.lastActivity&&<span>active {timeAgo(c.lastActivity)}</span>}
      </div>
    </div>)}
  </div>
}

      <div style={{display:"flex",flexDirection:"column",gap:S[1]}}>
        {(sec.events||[]).map((evt,ei)=><div key={ei} style={{...card(p),padding:S[3]+" "+S[4],opacity:evt.date<today?0.5:1,
          borderLeft:"2px solid "+(evt.date===today?p.accent:eC(evt.type))}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:T.sm,fontWeight:500,fontFamily:SF,color:p.label}}>{evt.title}</span>
            <span style={{fontSize:T.xs,fontFamily:MONO,color:evt.date===today?p.accent:p.label4}}>{evt.date===today?"Today":evt.time||evt.date}</span>
          </div>
          {evt.description&&<p style={{fontSize:T.xs,color:p.label3,fontFamily:SF,marginTop:2,lineHeight:1.4}}>{evt.description}</p>}
        </div>)}
      </div>
    </div>)}
  </div>
}

// ═══════════════════════════════════════════════════════════
// TIME AUDIT VIEW
// ═══════════════════════════════════════════════════════════
function TimeView({p,dk}){
  const[ta,setTa]=useState(null);
  useEffect(()=>{if(LIVE_DATA?.timeAudit)setTa(LIVE_DATA.timeAudit);else loadData().then(()=>{if(LIVE_DATA?.timeAudit)setTa(LIVE_DATA.timeAudit)})},[]);
  if(!ta)return <div style={{padding:S[8],textAlign:"center",color:p.label4,fontFamily:MONO,fontSize:T.sm}}>No time data</div>;
  var td=ta.today||{};
  function Bar({label,val,max,color}){var pct=max?Math.min((val/max)*100,100):0;
    return <div style={{marginBottom:S[3]}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
        <span style={{fontSize:T.xs,fontFamily:MONO,color:p.label3}}>{label}</span>
        <span style={{fontSize:T.xs,fontFamily:MONO,color:p.label}}>{val}{max?" / "+max:""}</span>
      </div>
      <div style={{height:4,borderRadius:2,background:p.fill3}}><div style={{height:4,borderRadius:2,background:color||p.accent,width:pct+"%",transition:"width 0.4s"}}/></div>
    </div>}
  return <div style={{padding:S[4],display:"flex",flexDirection:"column",gap:S[3]}}>
    <div style={{...card(p),padding:S[4]}}>
      <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",fontFamily:MONO,color:p.label4,marginBottom:S[3]}}>TODAY {td.date||""}</div>
      <Bar label="Meetings" val={td.meetings||0} max={8} color={td.meetings>6?p.red:td.meetings>4?p.orange:p.blue}/>
      <Bar label="Focus blocks" val={td.focusBlocks||0} max={4} color={p.green}/>
      <Bar label="1:1s" val={td.oneOnOnes||0} max={6} color={p.purple}/>
    </div>
    {ta.weekSummary&&<div style={{...card(p),padding:S[4]}}>
      <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",fontFamily:MONO,color:p.label4,marginBottom:S[2]}}>THIS WEEK</div>
      <p style={{fontSize:T.sm,color:p.label2,fontFamily:SF,lineHeight:1.5}}>{ta.weekSummary}</p>
    </div>}
  </div>
}

// ═══════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════
function SiftIntel(){
  const[dk,setDk]=useTheme();
  var p=dk?PAL.dark:PAL.light;
  var mob=useMobile();

  const[view,setView]=useState("now");
  const[sub,setSub]=useState({who:"team",how:"decisions",when:"calendar"});
  const[items,setItems]=useState([]);
  const[scanning,setScanning]=useState(false);
  const[progress,setProgress]=useState("");
  const[detail,setDetail]=useState(null);
  const[settings,setSettings]=useState(false);
  const[filterPri,setFilterPri]=useState("all");

  useEffect(()=>{window.__RADAR_LIVE_MODE=getLive();window.__RADAR_CUSTOM_PROMPT=getCustomPrompt()},[]);

  var filtered=useMemo(()=>{
    var f=items;
    if(filterPri!=="all")f=f.filter(i=>(i.priority||"").toUpperCase()===filterPri.toUpperCase());
    var order={URGENT:0,HIGH:1,MEDIUM:2,LOW:3};
    return[...f].sort((a,b)=>(order[(a.priority||"").toUpperCase()]||9)-(order[(b.priority||"").toUpperCase()]||9));
  },[items,filterPri]);

  async function scan(){
    if(scanning)return;setScanning(true);setProgress("Initializing...");setItems([]);
    try{
      var result=await runLiveScan(
        (ins,idx)=>{setItems(prev=>{var n=[...prev];n[idx]=ins;return n})},
        msg=>setProgress(msg)
      );
      if(result?.insights)setItems(result.insights);
      setProgress("Done — "+(result?.meta?.duration||"?")+"s");
    }catch(e){setProgress("Error: "+e.message)}
    setScanning(false);
  }

  useEffect(()=>{var t=setTimeout(()=>scan(),500);return()=>clearTimeout(t)},[]);

  useEffect(()=>{
    function handler(e){
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
      if(e.key==="r"&&!e.metaKey){e.preventDefault();scan()}
      if(e.key==="1")setView("now");if(e.key==="2")setView("who");
      if(e.key==="3")setView("how");if(e.key==="4")setView("when");
      if(e.key==="Escape"){setDetail(null);setSettings(false)}
    }
    window.addEventListener("keydown",handler);return()=>window.removeEventListener("keydown",handler);
  },[scanning]);

  // Tab data
  var tabs=[
    {id:"now",label:"Now",phase:"OBSERVE"},
    {id:"who",label:"Who",phase:"ORIENT"},
    {id:"how",label:"How",phase:"DECIDE"},
    {id:"when",label:"When",phase:"ACT"},
  ];
  var urgentCount=items.filter(i=>(i.priority||"").toUpperCase()==="URGENT").length;
  var highCount=items.filter(i=>(i.priority||"").toUpperCase()==="HIGH").length;

  return <div style={{height:"100vh",display:"flex",flexDirection:"column",position:"relative"}}>
    <Mesh dk={dk}/>

    {/* NAV */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:S[3]+" "+S[4],
      position:"relative",zIndex:10,borderBottom:"0.5px solid "+p.sep}}>
      <div style={{display:"flex",alignItems:"center",gap:S[2]}}>
        <span style={{fontSize:18,opacity:0.7}}>{"\u{1F4E1}"}</span>
        <span style={{fontSize:T.base,fontFamily:SYNE,fontWeight:700,color:p.label,letterSpacing:"0.02em"}}>RADAR</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:S[1]}}>
        <button onClick={()=>setSettings(true)} style={{background:"none",border:"none",color:p.label3,fontSize:15,cursor:"pointer",padding:S[1]}}>{"\u2699"}</button>
        <button onClick={()=>setDk(!dk)} style={{background:"none",border:"none",color:p.label3,fontSize:15,cursor:"pointer",padding:S[1]}}>{dk?"\u2600\uFE0F":"\u{1F319}"}</button>
        <button onClick={scan} disabled={scanning}
          style={{padding:"5px 14px",borderRadius:R.sm,border:"0.5px solid "+p.glassBorder,
            background:scanning?p.fill3:p.fill4,color:scanning?p.label3:p.label,
            fontSize:T.xs,fontFamily:MONO,fontWeight:600,cursor:scanning?"wait":"pointer",transition:"all 0.15s"}}
          onMouseEnter={e=>{if(!scanning)e.currentTarget.style.background=p.fill2}}
          onMouseLeave={e=>{e.currentTarget.style.background=scanning?p.fill3:p.fill4}}>
          {scanning?"Scanning...":"Scan"}
        </button>
      </div>
    </div>

    {/* TABS */}
    <div style={{display:"flex",position:"relative",zIndex:10,borderBottom:"0.5px solid "+p.sep}}>
      {tabs.map(t=>{
        var active=view===t.id;
        var badge=t.id==="now"&&urgentCount>0?urgentCount:t.id==="who"&&highCount>0?highCount:0;
        return <button key={t.id} onClick={()=>setView(t.id)}
          style={{flex:1,padding:S[3]+" "+S[2],background:"none",border:"none",
            borderBottom:active?"2px solid "+p.accent:"2px solid transparent",
            cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,transition:"all 0.15s"}}>
          <span style={{fontSize:T.sm,fontFamily:SYNE,fontWeight:active?700:400,color:active?p.label:p.label3}}>{t.label}</span>
          <span style={{fontSize:8,fontFamily:MONO,letterSpacing:"0.08em",color:active?p.accent:p.label4}}>{t.phase}</span>
          {badge>0&&<span style={{position:"absolute",top:4,marginLeft:28,fontSize:8,fontFamily:MONO,fontWeight:700,color:"#fff",
            background:p.red,borderRadius:R.full,minWidth:14,height:14,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px"}}>{badge}</span>}
        </button>
      })}
    </div>

    {/* PROGRESS */}
    {scanning&&<div style={{padding:"6px "+S[4],fontSize:T.xs,fontFamily:MONO,color:p.accent,borderBottom:"0.5px solid "+p.sep,
      position:"relative",zIndex:10,display:"flex",alignItems:"center",gap:S[2]}}>
      <span style={{animation:"pulse 1s infinite"}}>{"\u{1F4E1}"}</span> {progress}
    </div>}

    {/* CONTENT */}
    <div style={{flex:1,overflowY:"auto",overflowX:"hidden",position:"relative",zIndex:1,WebkitOverflowScrolling:"touch"}}>

      {view==="now"&&<div>
        {/* Summary */}
        {items.length>0&&<div style={{padding:S[3]+" "+S[4],display:"flex",alignItems:"baseline",gap:S[3]}}>
          <span style={{fontSize:T.xxl,fontFamily:SYNE,fontWeight:700,color:p.label}}>{items.length}</span>
          <span style={{fontSize:T.xs,fontFamily:MONO,color:p.label3}}>signals</span>
          {urgentCount>0&&<span style={{fontSize:T.xs,fontFamily:MONO,color:p.red}}>{urgentCount} urgent</span>}
          {highCount>0&&<span style={{fontSize:T.xs,fontFamily:MONO,color:p.orange}}>{highCount} high</span>}
        </div>}

        {/* Filters */}
        {items.length>0&&<div style={{display:"flex",gap:S[1],padding:"0 "+S[4],marginBottom:S[3],overflowX:"auto"}}>
          {["all","urgent","high","medium","low"].map(f=><button key={f} onClick={()=>setFilterPri(f)}
            style={{padding:"3px 10px",borderRadius:R.sm,border:"none",whiteSpace:"nowrap",
              background:filterPri===f?p.fill2:p.fill4,color:filterPri===f?p.label:p.label3,
              fontSize:T.xs,fontFamily:MONO,cursor:"pointer",transition:"all 0.12s",textTransform:"uppercase"}}>{f}</button>)}
        </div>}

        {/* Feed */}
        {scanning&&items.length===0&&<Skel p={p}/>}
        <div style={{display:"flex",flexDirection:"column",gap:S[2],padding:"0 "+S[4],paddingBottom:S[8]}}>
          {filtered.map((item,i)=><SignalCard key={item.id||i} item={item} index={i} p={p} dk={dk} onSelect={setDetail} mob={mob}/>)}
        </div>
        {!scanning&&items.length>0&&<div style={{padding:S[3]+" "+S[4],fontSize:T.xs,fontFamily:MONO,color:p.label4,textAlign:"center"}}>{progress}</div>}
      </div>}

      {view==="who"&&<div>
        <div style={{display:"flex",gap:S[1],padding:S[3]+" "+S[4],borderBottom:"0.5px solid "+p.sep}}>
          {[{id:"team",label:"Team"},{id:"customers",label:"Customers"}].map(t=>
            <button key={t.id} onClick={()=>setSub(s=>({...s,who:t.id}))}
              style={{padding:"4px 12px",borderRadius:R.sm,border:"none",fontSize:T.xs,fontFamily:MONO,cursor:"pointer",
                background:sub.who===t.id?p.fill2:p.fill4,color:sub.who===t.id?p.label:p.label3}}>{t.label}</button>)}
        </div>
        {sub.who==="team"?<TeamView p={p} dk={dk} mob={mob}/>:<CustomersView p={p} dk={dk}/>}
      </div>}

      {view==="how"&&<div>
        <div style={{display:"flex",gap:S[1],padding:S[3]+" "+S[4],borderBottom:"0.5px solid "+p.sep}}>
          {[{id:"decisions",label:"Decisions"},{id:"strategy",label:"Strategy"}].map(t=>
            <button key={t.id} onClick={()=>setSub(s=>({...s,how:t.id}))}
              style={{padding:"4px 12px",borderRadius:R.sm,border:"none",fontSize:T.xs,fontFamily:MONO,cursor:"pointer",
                background:sub.how===t.id?p.fill2:p.fill4,color:sub.how===t.id?p.label:p.label3}}>{t.label}</button>)}
        </div>
        {sub.how==="decisions"?<DecisionsView p={p} dk={dk}/>:<StrategyView p={p} dk={dk}/>}
      </div>}

      {view==="when"&&<div>
        <div style={{display:"flex",gap:S[1],padding:S[3]+" "+S[4],borderBottom:"0.5px solid "+p.sep}}>
          {[{id:"calendar",label:"Timeline"},{id:"time",label:"Time Audit"}].map(t=>
            <button key={t.id} onClick={()=>setSub(s=>({...s,when:t.id}))}
              style={{padding:"4px 12px",borderRadius:R.sm,border:"none",fontSize:T.xs,fontFamily:MONO,cursor:"pointer",
                background:sub.when===t.id?p.fill2:p.fill4,color:sub.when===t.id?p.label:p.label3}}>{t.label}</button>)}
        </div>
        {sub.when==="calendar"?<CalendarView p={p} dk={dk}/>:<TimeView p={p} dk={dk}/>}
      </div>}
    </div>

    {/* OVERLAYS */}
    {detail&&<Detail item={detail} p={p} dk={dk} mob={mob} onClose={()=>setDetail(null)}/>}
    {settings&&<Settings p={p} dk={dk} onClose={()=>setSettings(false)}/>}
  </div>
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(AuthGate,null,React.createElement(SiftIntel)));

</script>
</body>
</html>
