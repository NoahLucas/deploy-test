const { useState, useEffect, useRef, useCallback, useMemo } = React;
async function sha256(str){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function slackDraft({message,target,channelKey}){
  const ch=CH[channelKey]; if(!ch) throw new Error("Unknown channel");
  const isCh=ch.label.startsWith("#");
  const inst=ch.sid
    ? `Create a Slack draft in channel ${ch.sid}. Do not modify the message.`
    : isCh ? `Find Slack channel "${ch.label.replace("#","")}",create draft. Do not modify.`
    : `Find Slack user "${target||ch.label}",create draft DM. Do not modify.`;
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",max_tokens:1000,
      system:'You are a Slack routing agent. Find target, create draft. Never modify message. Respond ONLY: {"success":true,"channel_link":"<url>"} or {"success":false,"error":"<reason>"}',
      messages:[{role:"user",content:`${inst}\n\nMessage:\n${message}`}],
      mcp_servers:[{type:"url",url:"https://mcp.slack.com/mcp",name:"slack"}],
    }),
  });
  if(!r.ok) throw new Error(`API ${r.status}`);
  return parseSlack(await r.json());
}

function parseSlack(d){
  const txts=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const fUrl=s=>s.match(/https:\/\/app\.slack\.com\/[^\s"')\\]+/)?.[0]||null;
  try{const m=txts.match(/\{[\s\S]*?"success"[\s\S]*?\}/);
    if(m){const r=JSON.parse(m[0]);return{ok:r.success!==false,link:r.channel_link||null,err:r.error||null};}
  }catch{}
  const tools=(d.content||[]).filter(b=>b.type==="mcp_tool_result");
  if(tools.length)return{ok:true,link:fUrl(JSON.stringify(tools)),err:null};
  if(txts&&!/error|failed/i.test(txts))return{ok:true,link:fUrl(txts),err:null};
  return{ok:false,link:null,err:txts||"Unknown"};
}

async function clip(text){
  try{await navigator.clipboard.writeText(text);return true;}catch{
    const t=document.createElement("textarea");t.value=text;t.style.cssText="position:fixed;opacity:0";
    document.body.appendChild(t);t.select();
    try{document.execCommand("copy");document.body.removeChild(t);return true;}
    catch{document.body.removeChild(t);return false;}
  }
}

var LIVE_DATA=null;
var DATA_URL="./data.json";
var SERVER_URL=null; // Set to "http://localhost:3001" when server is running
var _ws=null;
var _stateVersion=0;
var _onPatch=null; // Set by React app to trigger re-renders

// Detect if server is available
async function _detectServer(){
  if(SERVER_URL) return SERVER_URL;
  // Try common local ports
  for(var port of [3001,3000,8080]){
    try{
      var r=await fetch("http://localhost:"+port+"/api/health",{signal:AbortSignal.timeout(500)});
      if(r.ok){SERVER_URL="http://localhost:"+port;console.log("[radar] Server found at "+SERVER_URL);return SERVER_URL;}
    }catch(e){}
  }
  return null;
}

// WebSocket connection for live patches
function _connectWS(){
  if(!SERVER_URL||_ws)return;
  var wsUrl=SERVER_URL.replace("http","ws")+"/ws";
  try{
    _ws=new WebSocket(wsUrl);
    _ws.onmessage=function(e){
      try{
        var msg=JSON.parse(e.data);
        if(msg.type==="connected"){
          _stateVersion=msg.version;
          console.log("[ws] Connected, version "+_stateVersion);
        }else if(msg.path&&LIVE_DATA){
          // Apply patch to LIVE_DATA
          _applyPatch(LIVE_DATA,msg.path,msg.value);
          _stateVersion=msg.version||_stateVersion+1;
          if(_onPatch)_onPatch(msg);
        }
      }catch(err){console.warn("[ws] Parse error:",err);}
    };
    _ws.onclose=function(){_ws=null;setTimeout(_connectWS,5000);};
    _ws.onerror=function(){_ws=null;};
  }catch(e){console.warn("[ws]",e.message);}
}

function _applyPatch(obj,path,value){
  var parts=path.split(".");
  var target=obj;
  for(var i=0;i<parts.length-1;i++){
    var k=isNaN(parts[i])?parts[i]:parseInt(parts[i]);
    if(!target[k])target[k]={};
    target=target[k];
  }
  var last=isNaN(parts[parts.length-1])?parts[parts.length-1]:parseInt(parts[parts.length-1]);
  target[last]=value;
}

async function loadData(){
  try{
    // Try server first
    var serverUrl=await _detectServer();
    if(serverUrl){
      var r=await fetch(serverUrl+"/api/state");
      if(r.ok){
        var resp=await r.json();
        LIVE_DATA=resp.data;
        _stateVersion=resp.version;
        _connectWS();
        console.log("[radar] Loaded from server, version "+_stateVersion);
        return LIVE_DATA;
      }
    }
    // Fallback to static data.json
    var r=await fetch(DATA_URL);
    if(!r.ok) throw new Error("HTTP "+r.status);
    LIVE_DATA=await r.json();
    // Post-process: make timeAudit relative to today
    if(LIVE_DATA.timeAudit&&LIVE_DATA.timeAudit.today){
      LIVE_DATA.timeAudit.today.date=new Date().toISOString().slice(0,10);
    }
    // Post-process: make timeline event dates relative to today
    if(LIVE_DATA.timeline&&LIVE_DATA.timeline.sections){
      var dataDate=new Date("2026-03-03T12:00:00");
      var realToday=new Date();realToday.setHours(12,0,0,0);
      var offsetMs=realToday.getTime()-dataDate.getTime();
      var offsetDays=Math.round(offsetMs/86400000);
      if(offsetDays!==0){
        LIVE_DATA.timeline.sections.forEach(function(sec){
          if(sec.events)sec.events.forEach(function(ev){
            if(ev.date){
              var d=new Date(ev.date+"T12:00:00");
              d.setDate(d.getDate()+offsetDays);
              ev.date=d.toISOString().slice(0,10);
            }
          });
        });
      }
    }
    // Post-process: make Slack timestamps relative
    if(LIVE_DATA.team){
      var slackBase=new Date("2026-03-03T12:00:00").getTime();
      var nowMs=Date.now();
      var slackOff=nowMs-slackBase;
      LIVE_DATA.team.forEach(function(person){
        if(person.slackLastSeen){
          var t=new Date(person.slackLastSeen).getTime()+slackOff;
          person.slackLastSeen=new Date(t).toISOString();
        }
      });
    }
    // Post-process: make cofounder timestamps relative
    if(LIVE_DATA.cofounders){
      var cfBase=new Date("2026-03-03T12:00:00").getTime();
      var cfOff=Date.now()-cfBase;
      LIVE_DATA.cofounders.forEach(function(cf){
        if(cf.lastSlackToNoah){
          var t=new Date(cf.lastSlackToNoah).getTime()+cfOff;
          cf.lastSlackToNoah=new Date(t).toISOString();
        }
      });
    }
    console.log("[radar] Loaded from static data.json (server not available)");
    return LIVE_DATA;
  }catch(e){
    console.error("Failed to load data:",e);
    return null;
  }
}

function tryParse(s){
  try{return JSON.parse(s);}catch(e){return null;}
}

function extractInsightsFromPartial(text){
  var clean=text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
  var fixed=clean.replace(/,\s*([}\]])/g,"$1");
  // Try extracting individual insight objects using balanced brace matching
  var results=[];
  var inArr=fixed.indexOf("[");
  if(inArr<0) return results;
  var sub=fixed.slice(inArr+1);
  var depth=0; var start=-1;
  for(var ci=0;ci<sub.length;ci++){
    if(sub[ci]==="{"){if(depth===0)start=ci;depth++;}
    if(sub[ci]==="}"){depth--;if(depth===0&&start>=0){
      var chunk=sub.slice(start,ci+1);
      var obj=tryParse(chunk);
      if(obj&&obj.headline) results.push(obj);
      start=-1;
    }}
  }
  return results;
}

function robustParseFinal(text){
  var clean=text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
  if(!clean||clean.length===0) return{insights:[]};
  var parsed=tryParse(clean);
  if(parsed) return parsed;
  var fixed=clean.replace(/,\s*([}\]])/g,"$1");
  parsed=tryParse(fixed);
  if(parsed) return parsed;
  var m=fixed.match(/\{[\s\S]*"insights"\s*:\s*\[[\s\S]*\]\s*\}/);
  if(m){parsed=tryParse(m[0]);if(parsed)return parsed;}
  m=fixed.match(/"insights"\s*:\s*(\[[\s\S]*\])/);
  if(m){var arr=tryParse(m[1]);if(arr)return{insights:arr};}
  m=fixed.match(/\[[\s\S]*\]/);
  if(m){var arr2=tryParse(m[0]);if(arr2)return{insights:arr2};}
  var fixed2=fixed.replace(/":\s*"[^"]*\n/g,function(m){return m.replace(/\n/g,"\\n");});
  parsed=tryParse(fixed2);
  if(parsed) return parsed;
  // Last resort: extract whatever individual objects we can
  var partial=extractInsightsFromPartial(text);
  if(partial.length>0) return{insights:partial};
  throw new Error("Parse failed (len="+clean.length+"): "+clean.slice(0,200));
}

function compactData(data){
  var c=JSON.parse(JSON.stringify(data));
  function tail(arr,n){if(!arr)return arr;return arr.slice(-(n||7));}
  if(c.amplitude){
    var a=c.amplitude;
    if(a.dau){a.dau.dates=tail(a.dau.dates);a.dau.values=tail(a.dau.values);delete a.dau.chart;}
    if(a.newUsers){a.newUsers.weeks=tail(a.newUsers.weeks);a.newUsers.values=tail(a.newUsers.values);delete a.newUsers.chart;}
    if(a.sessionDuration){a.sessionDuration.weeks=tail(a.sessionDuration.weeks);a.sessionDuration.values=tail(a.sessionDuration.values);delete a.sessionDuration.chart;}
    if(a.featureAdoption){a.featureAdoption.weeks=tail(a.featureAdoption.weeks);a.featureAdoption.explore=tail(a.featureAdoption.explore);a.featureAdoption.rules=tail(a.featureAdoption.rules);a.featureAdoption.reports=tail(a.featureAdoption.reports);a.featureAdoption.runs=tail(a.featureAdoption.runs);delete a.featureAdoption.chart;}
    if(a.collaboration){a.collaboration.weeks=tail(a.collaboration.weeks);a.collaboration.shareIcon=tail(a.collaboration.shareIcon);a.collaboration.annotationCreate=tail(a.collaboration.annotationCreate);a.collaboration.shareLinkViewed=tail(a.collaboration.shareLinkViewed);delete a.collaboration.chart;}
    if(a.engagement){a.engagement.weeks=tail(a.engagement.weeks);a.engagement.annotationCreate=tail(a.engagement.annotationCreate);a.engagement.calcChannel=tail(a.engagement.calcChannel);a.engagement.chartShare=tail(a.engagement.chartShare);delete a.engagement.chart;}
    if(a.keyActions)delete a.keyActions.chart;
    if(a.retention)delete a.retention.chart;
  }
  return c;
}

\":\"<sharp, max 60 chars>\",\"body\":\"<2-3 sentence summary>\",\"action\":\"<ready-to-paste next step>\",\"situation\":\"<what is happening>\",\"whyItMatters\":\"<consequence if ignored>\",\"recommendation\":\"<specific next move>\",\"recTarget\":\"-> <TARGET>\",\"priority\":\"URGENT|HIGH|MEDIUM|LOW\",\"sources\":[\"amplitude\",\"slack\",\"linear\",\"calendar\"],\"actionType\":\"message|escalate|celebrate|delegate|prep\",\"actionTarget\":\"<person or channel>\",\"channelKey\":\"<gui|account-owner|shiproom|jared|fde-heart|benji|all-hands|product>\",\"sparkline\":[7 numbers 0-100],\"evidence\":[{\"label\":\"<what>\",\"url\":\"<REAL url from input data>\",\"source\":\"<src>\"}],\"context\":{\"metric\":\"<number>\",\"delta\":\"<change>\",\"baseline\":\"<comparison>\",\"risk\":\"<level>\"},\"feeds\":[{\"source\":\"<src>\",\"chart\":\"<id>\",\"freshness\":\""+data.fetchedAt+"\"}]}]}\n\nPriority: URGENT=revenue at risk/security hole/customer blocked, HIGH=action today, MEDIUM=this week, LOW=positive/FYI\nCategory guidance: PREP for meetings within 24h. NUDGE for people waiting on you. LEVERAGE for things to delegate or connect. BLIND SPOT for items >5 days stale or customers gone quiet.\n\nIMPORTANT: Preserve all evidence URLs from the input signals. Do not fabricate URLs. If the input signal has evidence[].url values, copy them exactly into your output.";

    }),

    throw new Error("API "+r.status+": "+errBody.slice(0,200));
  }
  var reader=r.body.getReader();
  var decoder=new TextDecoder();
  var fullText="";
  var lastYielded=0;
  var buffer="";
  onProgress("Scanning sources...");
  while(true){
    var chunk=reader.read();
    var result=await chunk;
    if(result.done) break;
    buffer+=decoder.decode(result.value,{stream:true});
    var evts=buffer.split("\n");
    buffer=evts.pop()||"";
    for(var ei=0;ei<evts.length;ei++){
      var line=evts[ei];
      if(!line.startsWith("data: "))continue;

      if(!evt)continue;
      if(evt.type==="content_block_delta"&&evt.delta&&evt.delta.text){
        fullText+=evt.delta.text;
        var partial=extractInsightsFromPartial(fullText);
        if(partial.length>lastYielded){
          for(var ni=lastYielded;ni<partial.length;ni++){
            onInsight(partial[ni],ni);
          }
          lastYielded=partial.length;
          onProgress(lastYielded+" item"+(lastYielded>1?"s":"")+" found...");
        }
      }
    }
  }
  var dur=((Date.now()-t0)/1000).toFixed(0);
  // Final parse for complete data
  var final=robustParseFinal(fullText);
  onProgress("Done \u2014 "+dur+"s");
  return{insights:final.insights||[],meta:{duration:dur,errors:[],sourcesOk:3}};
}

function timeAgo(ts){
  if(!ts)return"—";var d=new Date(ts);if(isNaN(d))return ts;
  var sec=Math.floor((Date.now()-d)/1000);
  if(sec<60)return"now";if(sec<3600)return Math.floor(sec/60)+"m";
  if(sec<86400)return Math.floor(sec/3600)+"h";return Math.floor(sec/86400)+"d";
}
function timeGroup(ts){
  if(!ts)return"Earlier";var d=new Date(ts);if(isNaN(d))return"Earlier";
  var hr=d.getHours();return hr<12?"Morning":"Afternoon";
}

// Sparkline — minimal, monochrome by default
function Sparkline({data,w,h,color,p}){
  if(!data||!data.length)return null;
  var width=w||80,height=h||24;

  var range=max-min||1;
  var pts=data.map(function(v,i){return(i/(data.length-1))*width+","+(height-((v-min)/range)*height);}).join(" ");
  return(<svg width={width} height={height} style={{display:"block"}}><polyline points={pts} fill="none" stroke={color||p.label3} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>);
}

// Evidence label derivation
function evLabel(ev){
  if(ev.label&&ev.label.trim())return ev.label.trim();
  var srcName=SVC[ev.source]?.label||ev.source||"";
  if(!ev.url)return srcName||"Link";
  try{
    var u=new URL(ev.url);
    var host=u.hostname.replace(/^www\./,"");
    var path=u.pathname.split("/").filter(Boolean);
    if(host.includes("amplitude")){
      if(path.includes("chart"))return srcName+": Chart "+path.slice(-1)[0];
      if(path.includes("dashboard"))return srcName+": Dashboard";
      return srcName+(path.length>2?": "+path.slice(-1)[0]:"");
    }
    if(host.includes("linear")){
      var last=path.slice(-1)[0]||"";
      if(/^[A-Z]+-\d+$/.test(last))return last;
      return srcName+(last?": "+last:"");
    }
    if(host.includes("slack"))return srcName+": thread";
    if(host.includes("docs.google"))return "Google Doc";
    if(host.includes("calendar.google"))return srcName+": event";
    if(host.includes("granola"))return srcName+": meeting notes";
    if(host.includes("gmail"))return "Gmail: message";
    if(path.length>0){var seg=decodeURIComponent(path.slice(-1)[0]).replace(/[-_]/g," ");return seg.length>30?seg.slice(0,28)+"\u2026":seg;}
    return srcName||host.replace(/\.com$|\.io$|\.app$/,"")||"Link";
  }catch(e){return srcName||"Link";}
}

// ====== INSIGHT CHAT ======
function InsightChat({insight,p,dk}){
  const[msgs,setMsgs]=useState([]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const scrollRef=useRef(null);
  useEffect(function(){if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;},[msgs]);
  async function send(){
    if(!input.trim()||loading)return;
    var userMsg=input.trim();setInput("");
    setMsgs(function(prev){return prev.concat({role:"user",text:userMsg});});
    setLoading(true);
    try{
      var history=msgs.map(function(m){return{role:m.role==="user"?"user":"assistant",content:m.text};});
      history.push({role:"user",content:userMsg});
      var r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1024,
          system:"You are RADAR's analysis assistant. The user is asking about this signal:\nHeadline: "+insight.headline+"\nBody: "+insight.body+"\nCategory: "+insight.category+"\nPriority: "+insight.priority+"\n\nBe concise. 2-3 sentences max.",
          messages:history}),
      });
      var d=await r.json();
      var reply=(d.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n")||"No response";
      setMsgs(function(prev){return prev.concat({role:"assistant",text:reply});});
    }catch(e){setMsgs(function(prev){return prev.concat({role:"assistant",text:"Error: "+e.message});});}
    setLoading(false);
  }
  return(<div style={{marginTop:S[4],borderTop:"0.5px solid "+p.sep,paddingTop:S[4]}}>
    <div style={{fontSize:T.xs,fontFamily:MONO,fontWeight:600,letterSpacing:"0.1em",color:p.label4,marginBottom:S[2]}}>ASK ABOUT THIS SIGNAL</div>
    <div ref={scrollRef} style={{maxHeight:200,overflowY:"auto",marginBottom:S[2],display:"flex",flexDirection:"column",gap:S[2]}}>
      {msgs.map(function(m,i){return <div key={i} style={{padding:S[2]+" "+S[3],borderRadius:R.sm,fontSize:T.sm,fontFamily:SF,lineHeight:1.5,
        background:m.role==="user"?p.fill3:p.fill4,color:m.role==="user"?p.label:p.label2,
        alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"85%"}}>{m.text}</div>;})}
      {loading&&<div style={{padding:S[2],fontSize:T.xs,fontFamily:MONO,color:p.label4,animation:"pulse 1s infinite"}}>thinking...</div>}
    </div>
    <div style={{display:"flex",gap:S[2]}}>
      <input value={input} onChange={function(e){setInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")send();}}
        placeholder="Ask a question..." style={{flex:1,padding:"8px 12px",borderRadius:R.sm,border:"0.5px solid "+p.glassBorder,
          background:p.fill4,color:p.label,fontSize:T.sm,fontFamily:SF,outline:"none"}} />
      <button onClick={send} disabled={loading||!input.trim()}
        style={{padding:"8px 16px",borderRadius:R.sm,border:"none",background:p.fill2,color:p.label,
          fontSize:T.sm,fontFamily:SF,fontWeight:500,cursor:"pointer",opacity:loading||!input.trim()?0.4:1}}>Send</button>
    </div>
  </div>);
}

function DecisionsView({p,dk}){
  const[decisions,setDecisions]=useState([]);
  useEffect(function(){if(LIVE_DATA?.decisions)setDecisions(LIVE_DATA.decisions);else loadData().then(function(){if(LIVE_DATA?.decisions)setDecisions(LIVE_DATA.decisions);});},[]);
  function urgency(d){var t=new Date(d.deadline);var days=Math.ceil((t-Date.now())/86400000);return days<0?"overdue":days<3?"urgent":days<7?"soon":"ok";}
  if(!decisions.length)return <div style={{padding:S[6],textAlign:"center",color:p.label4,fontFamily:MONO,fontSize:T.sm}}>No decisions data</div>;

    {decisions.map(function(d,i){
      var u=urgency(d);
      return(<div key={i} style={{...surface(p,1),padding:S[4],borderLeft:"2px solid "+(u==="overdue"?p.red:u==="urgent"?p.orange:u==="soon"?p.yellow:"transparent")}}>

function CalendarView({p,dk}){
  const[tl,setTl]=useState(null);
  useEffect(function(){if(LIVE_DATA?.timeline)setTl(LIVE_DATA.timeline);else loadData().then(function(){if(LIVE_DATA?.timeline)setTl(LIVE_DATA.timeline);});},[]);
  if(!tl)return <div style={{padding:S[6],textAlign:"center",color:p.label4,fontFamily:MONO,fontSize:T.sm}}>No timeline data</div>;
  function stColor(t){return t==="deadline"?p.red:t==="gate"?p.orange:t==="meeting"?p.blue:t==="milestone"?p.green:p.gray;}
  function typeIcon(t){return t==="deadline"?"\u{1F534}":t==="gate"?"\u{1F7E0}":t==="meeting"?"\u{1F4C5}":t==="milestone"?"\u2B50":"\u25CB";}
  function relDay(d){var today=new Date().toISOString().slice(0,10);if(d===today)return"Today";var tom=new Date(Date.now()+86400000).toISOString().slice(0,10);if(d===tom)return"Tomorrow";return d;}
  function fmtDate(d){try{return new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}catch(e){return d;}}
  function isPast(d){return d<new Date().toISOString().slice(0,10);}
  function isToday(d){return d===new Date().toISOString().slice(0,10);}
  return(<div style={{padding:S[4],display:"flex",flexDirection:"column",gap:S[3]}}>
    {(tl.sections||[]).map(function(sec,si){return(
      <div key={si}>
        <div style={{fontSize:T.xs,fontWeight:700,letterSpacing:"0.1em",fontFamily:MONO,color:p.label4,marginBottom:S[2]}}>{(sec.label||"").toUpperCase()}</div>
        <div style={{display:"flex",flexDirection:"column",gap:S[2]}}>
          {(sec.events||[]).map(function(evt,ei){return(
            <div key={ei} style={{...surface(p,1),padding:S[3]+" "+S[4],opacity:isPast(evt.date)?0.5:1,
              borderLeft:"2px solid "+(isToday(evt.date)?p.accent:stColor(evt.type))}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:S[2]}}>
                  <span style={{fontSize:T.sm}}>{typeIcon(evt.type)}</span>
                  <span style={{fontSize:T.sm,fontWeight:500,fontFamily:SF,color:p.label}}>{evt.title}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:S[2]}}>
                  {evt.time&&<span style={{fontSize:T.xs,fontFamily:MONO,color:p.label3}}>{evt.time}</span>}
                  <span style={{fontSize:T.xs,fontFamily:MONO,color:isToday(evt.date)?p.accent:p.label4}}>{relDay(evt.date)||fmtDate(evt.date)}</span>
                </div>
              </div>
              {evt.description&&<p style={{fontSize:T.xs,color:p.label3,fontFamily:SF,marginTop:S[1],lineHeight:1.4}}>{evt.description}</p>}
              {evt.owner&&<span style={{fontSize:T.xs,fontFamily:MONO,color:p.label4,marginTop:S[1],display:"block"}}>{evt.owner}</span>}
            </div>
          );})}
        </div>
      </div>
    );})}
  </div>);
}

// View tabs — OODA framework
function ViewTabs({active,onChange,p,dk}){
  var views=[
    {id:"now",label:"Now",sub:"OBSERVE"},
    {id:"who",label:"Who",sub:"ORIENT"},
    {id:"how",label:"How",sub:"DECIDE"},
    {id:"when",label:"When",sub:"ACT"},
  ];
  // Compute badges
  var badges={};
  if(LIVE_DATA){
    var blocked=(LIVE_DATA.team||[]).filter(function(t){return t.status==="blocked"||t.status==="attention";}).length;
    var atRisk=(LIVE_DATA.customers||[]).filter(function(c){return c.trajectory==="at-risk"||c.trajectory==="contracting";}).length;
    if(blocked+atRisk>0)badges.who=blocked+atRisk;
    var decCount=(LIVE_DATA.decisions||[]).length||0;
    var arKr=0;(LIVE_DATA.strategyMetrics?.pillars||[]).forEach(function(pil){(pil.keyResults||[]).forEach(function(kr){if(kr.status==="at_risk")arKr++;});});
    if(decCount+arKr>0)badges.how=decCount+arKr;
    var td=new Date().toISOString().slice(0,10);
    var urg=(LIVE_DATA.timeline?.sections||[]).flatMap(function(s){return s.events;}).filter(function(e){return(e.type==="deadline"||e.type==="gate")&&e.date>=td&&e.date<=new Date(Date.now()+14*86400000).toISOString().slice(0,10);}).length;
    if(urg>0)badges.when=urg;
  }
  return(<div style={{display:"flex",borderBottom:"0.5px solid "+p.sep,position:"relative",zIndex:100,background:p.bg}}>
    {views.map(function(v){
      var isActive=active===v.id;
      var badge=badges[v.id]||0;
      return(<button key={v.id} onClick={function(){onChange(v.id);}}
        style={{flex:1,padding:S[3]+" "+S[2],background:"none",border:"none",borderBottom:isActive?"2px solid "+p.accent:"2px solid transparent",
          cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,
          transition:"all 0.15s",position:"relative"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:T.sm,fontFamily:SYNE,fontWeight:isActive?700:500,color:isActive?p.label:p.label3}}>{v.label}</span>
          {badge>0&&<span style={{fontSize:9,fontFamily:MONO,fontWeight:600,color:"#fff",
            background:v.id==="now"?p.red:p.orange,borderRadius:R.full,
            minWidth:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{badge}</span>}
        </div>
        <span style={{fontSize:9,fontFamily:MONO,letterSpacing:"0.08em",color:isActive?p.accent:p.label4}}>{v.sub}</span>
      </button>);
    })}
  </div>);
}

  const[sub,setSub]=useState("calendar");
  return(<>
    <SubTab tabs={[{id:"calendar",label:"Timeline",icon:"\u{1F4C5}"},{id:"time",label:"Time Audit",icon:"\u23F1\uFE0F"}]} active={sub} onChange={setSub} p={p} />
    {sub==="calendar"?<CalendarView p={p} dk={dk}/>:<TimeView p={p} dk={dk}/>}
  </>);
}

// ====== PULL TO SCAN ======
function PullIndicator({progress,p}){
  if(progress<=0)return null;
  var pct=Math.min(progress/80,1);
  return(<div style={{position:"absolute",top:0,left:0,right:0,height:3,zIndex:200,overflow:"hidden"}}>
    <div style={{height:"100%",background:p.accent,width:(pct*100)+"%",transition:"width 0.1s",borderRadius:"0 2px 2px 0"}} />
  </div>);
}

// ====== MAIN APP ======
function SiftIntel(){
  const[dk,setDk]=useTheme();
  var p=dk?PAL.dark:PAL.light;
  var mobile=useMobile();

  // State
  const[view,setView]=useState("now");
  const[items,setItems]=useState([]);
  const[scanning,setScanning]=useState(false);
  const[progress,setProgress]=useState("");
  const[detail,setDetail]=useState(null);
  const[brief,setBrief]=useState(false);
  const[settings,setSettings]=useState(false);
  const[pullY,setPullY]=useState(0);
  const scrollRef=useRef(null);
  const touchRef=useRef({startY:0,scrollTop:0});

  // Filter + sort for NOW view
  const[filterPri,setFilterPri]=useState("all");
  const[sortBy,setSortBy]=useState("priority");

  var filtered=useMemo(function(){
    var f=items;
    if(filterPri!=="all")f=f.filter(function(i){return(i.priority||"").toUpperCase()===filterPri.toUpperCase();});
    if(sortBy==="priority"){
      var order={URGENT:0,HIGH:1,MEDIUM:2,LOW:3};
      f=[...f].sort(function(a,b){return(order[(a.priority||"").toUpperCase()]||9)-(order[(b.priority||"").toUpperCase()]||9);});
    }else if(sortBy==="category"){
      f=[...f].sort(function(a,b){return(a.category||"").localeCompare(b.category||"");});
    }
    return f;
  },[items,filterPri,sortBy]);

  // Init: set live mode from storage
  useEffect(function(){
    window.__RADAR_LIVE_MODE=getLive();
    window.__RADAR_CUSTOM_PROMPT=getCustomPrompt();
  },[]);

  // Scan function
  async function scan(){
    if(scanning)return;
    setScanning(true);setProgress("Initializing...");setItems([]);
    try{
      var result=await runLiveScan(
        function onInsight(ins,idx){setItems(function(prev){var n=[...prev];n[idx]=ins;return n;});},
        function onProgress(msg){setProgress(msg);}
      );
      if(result?.insights)setItems(result.insights);
      setProgress("Done — "+(result?.meta?.duration||"?")+"s"+(result?.meta?.live?" (live)":""));
    }catch(e){
      setProgress("Error: "+e.message);
    }
    setScanning(false);
  }

  // Auto-scan on first load
  useEffect(function(){
    var timer=setTimeout(function(){scan();},500);
    return function(){clearTimeout(timer);};
  },[]);

  // Pull to scan
  function onTouchStart(e){
    if(!scrollRef.current||scrollRef.current.scrollTop>5)return;
    touchRef.current={startY:e.touches[0].clientY,scrollTop:scrollRef.current.scrollTop};
  }
  function onTouchMove(e){
    if(!scrollRef.current||touchRef.current.scrollTop>5)return;
    var dy=e.touches[0].clientY-touchRef.current.startY;
    if(dy>0){e.preventDefault();setPullY(dy);}
  }
  function onTouchEnd(){
    if(pullY>80&&!scanning)scan();
    setPullY(0);
  }

  // Keyboard shortcuts
  useEffect(function(){
    function handler(e){
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
      if(e.key==="r"&&!e.metaKey){e.preventDefault();scan();}
      if(e.key==="1")setView("now");
      if(e.key==="2")setView("who");
      if(e.key==="3")setView("how");
      if(e.key==="4")setView("when");
      if(e.key==="b")setBrief(true);
      if(e.key==="Escape"){setDetail(null);setBrief(false);setSettings(false);}
    }
    window.addEventListener("keydown",handler);
    return function(){window.removeEventListener("keydown",handler);};
  },[scanning]);

  return(<div style={{height:"100vh",display:"flex",flexDirection:"column",background:p.bg,color:p.label,position:"relative"}}>
    <AmbientMesh dk={dk} />
    <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",height:"100%"}}>
      <NavBar dk={dk} setDk={setDk} onScan={scan} scanning={scanning} onSettings={function(){setSettings(true);}} p={p} />
      <ViewTabs active={view} onChange={setView} p={p} dk={dk} />

      {/* Scan progress bar */}
      {scanning&&<div style={{padding:S[2]+" "+S[4],fontSize:T.xs,fontFamily:MONO,color:p.accent,
        borderBottom:"0.5px solid "+p.sep,display:"flex",alignItems:"center",gap:S[2]}}>
        <span style={{animation:"pulse 1s infinite"}}>{"\u{1F4E1}"}</span> {progress}
      </div>}

      {/* Main content area */}
      <div ref={scrollRef} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        style={{flex:1,overflowY:"auto",overflowX:"hidden",position:"relative",
          WebkitOverflowScrolling:"touch",overscrollBehavior:"contain"}}>
        <PullIndicator progress={pullY} p={p} />

        {view==="now"&&<div>
          {items.length>0&&<SummaryHeader items={items} p={p} dk={dk} onBrief={function(){setBrief(true);}} />}

          {/* Filter/sort bar */}
          {items.length>0&&<div style={{display:"flex",gap:S[1],padding:"0 "+S[4],marginBottom:S[2],overflowX:"auto"}}>
            {["all","urgent","high","medium","low"].map(function(f){return(
              <button key={f} onClick={function(){setFilterPri(f);}}
                style={{padding:"3px 10px",borderRadius:R.sm,border:"none",whiteSpace:"nowrap",
                  background:filterPri===f?p.fill2:p.fill4,color:filterPri===f?p.label:p.label3,
                  fontSize:T.xs,fontFamily:MONO,cursor:"pointer",transition:"all 0.15s",textTransform:"uppercase"}}>
                {f}
              </button>
            );})}
            <div style={{marginLeft:"auto",display:"flex",gap:S[1]}}>
              {[{id:"priority",label:"Priority"},{id:"category",label:"Category"},{id:"time",label:"Time"}].map(function(s){return(
                <button key={s.id} onClick={function(){setSortBy(s.id);}}
                  style={{padding:"3px 8px",borderRadius:R.sm,border:"none",
                    background:sortBy===s.id?p.fill2:p.fill4,color:sortBy===s.id?p.label:p.label3,
                    fontSize:T.xs,fontFamily:MONO,cursor:"pointer"}}>
                  {s.label}
                </button>
              );})}
            </div>
          </div>}

          {/* Feed */}
          {scanning&&items.length===0&&<div style={{padding:S[4]}}><SkeletonFeed p={p} /></div>}
          <div style={{display:"flex",flexDirection:"column",gap:S[2],padding:"0 "+S[4],paddingBottom:S[8]}}>
            {filtered.map(function(item,i){return <FeedItem key={item.id||i} item={item} index={i} p={p} dk={dk}
              onSelect={function(it){setDetail(it);}} mobile={mobile} />;})}
          </div>
          {items.length>0&&<FeedProvenance meta={items._meta} scanTime={progress} p={p} />}
        </div>}

        {view==="who"&&<WhoView p={p} dk={dk} />}
        {view==="how"&&<HowView p={p} dk={dk} />}
        {view==="when"&&<WhenView p={p} dk={dk} />}
      </div>
    </div>

    {/* Overlays */}
    {detail&&<Detail item={detail} p={p} dk={dk} onClose={function(){setDetail(null);}} />}
    {brief&&<SpeedBrief items={items} p={p} dk={dk} onClose={function(){setBrief(false);}} />}
    {settings&&<SettingsPanel p={p} dk={dk} onClose={function(){setSettings(false);}} />}
  </div>);
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(AuthGate, null, React.createElement(SiftIntel)));

</script>
</body>
</html>
