const PASS_HASH="f226a9d29cdb97d342436fe240a05ca06bb3cb037025874347b5ae06f1bf963b";
async function sha256(str){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function getAuth(){try{return sessionStorage.getItem("radar_auth")==="1";}catch(e){return false;}}
function setAuth(){try{sessionStorage.setItem("radar_auth","1");}catch(e){}}

function AuthGate({children}){

  const[pw,setPw]=useState("");

  const[checking,setChecking]=useState(false);
  const inputRef=useRef(null);
  useEffect(()=>{if(!ok&&inputRef.current)inputRef.current.focus();},[ok]);
  async function check(){
    setChecking(true);setErr(false);
    const h=await sha256(pw);
    if(h===PASS_HASH){setAuth();setOk(true);}
    else{setErr(true);setPw("");setTimeout(()=>setErr(false),2000);}
    setChecking(false);
  }

  const sf="'IBM Plex Sans',-apple-system,system-ui,sans-serif";
  return(
    <div style={{width:"100vw",height:"100dvh",background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:sf}}>
      <div style={{width:320,display:"flex",flexDirection:"column",alignItems:"center",gap:24}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:28}}>{"📡"}</span>

        <div style={{width:"100%",display:"flex",gap:8}}>
          <input ref={inputRef} type="password" value={pw} onChange={e=>setPw(e.target.value)}

          <button onClick={check} disabled={!pw||checking}
            style={{padding:"12px 20px",borderRadius:12,border:"none",cursor:pw?"pointer":"default",

async function slackDraft({message,target,channelKey}){
  const ch=CH[channelKey]; if(!ch) throw new Error("Unknown channel");
  const isCh=ch.label.startsWith("#");
  const inst=ch.sid
    ? `Create a Slack draft in channel ${ch.sid}. Do not modify the message.`
    : isCh ? `Find Slack channel "${ch.label.replace("#","")}",create draft. Do not modify.`
    : `Find Slack user "${target||ch.label}",create draft DM. Do not modify.`;
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",max_tokens:1000,
      system:'You are a Slack routing agent. Find target, create draft. Never modify message. Respond ONLY: {"success":true,"channel_link":"<url>"} or {"success":false,"error":"<reason>"}',
      messages:[{role:"user",content:`${inst}\n\nMessage:\n${message}`}],
      mcp_servers:[{type:"url",url:"https://mcp.slack.com/mcp",name:"slack"}],
    }),
  });
  if(!r.ok) throw new Error(`API ${r.status}`);
  return parseSlack(await r.json());
}

function parseSlack(d){
  const txts=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const fUrl=s=>s.match(/https:\/\/app\.slack\.com\/[^\s"')\\]+/)?.[0]||null;
  try{const m=txts.match(/\{[\s\S]*?"success"[\s\S]*?\}/);
    if(m){const r=JSON.parse(m[0]);return{ok:r.success!==false,link:r.channel_link||null,err:r.error||null};}
  }catch{}
  const tools=(d.content||[]).filter(b=>b.type==="mcp_tool_result");
  if(tools.length)return{ok:true,link:fUrl(JSON.stringify(tools)),err:null};
  if(txts&&!/error|failed/i.test(txts))return{ok:true,link:fUrl(txts),err:null};
  return{ok:false,link:null,err:txts||"Unknown"};
}

async function clip(text){
  try{await navigator.clipboard.writeText(text);return true;}catch{
    const t=document.createElement("textarea");t.value=text;t.style.cssText="position:fixed;opacity:0";
    document.body.appendChild(t);t.select();
    try{document.execCommand("copy");document.body.removeChild(t);return true;}
    catch{document.body.removeChild(t);return false;}
  }
}

var _stateVersion=0;
var _onPatch=null; // Set by React app to trigger re-renders

// Detect if server is available
async function _detectServer(){return null; /* skip localhost detection */
  if(SERVER_URL) return SERVER_URL;
  // Try common local ports
  for(var port of [3001,3000,8080]){
    try{
      var r=await fetch("http://localhost:"+port+"/api/health",{signal:AbortSignal.timeout(500)});

    }catch(e){}
  }
  return null;
}

// WebSocket connection for live patches
function _connectWS(){
  if(!SERVER_URL||_ws)return;
  var wsUrl=SERVER_URL.replace("http","ws")+"/ws";
  try{
    _ws=new WebSocket(wsUrl);
    _ws.onmessage=function(e){
      try{
        var msg=JSON.parse(e.data);
        if(msg.type==="connected"){
          _stateVersion=msg.version;
          console.log("[ws] Connected, version "+_stateVersion);
        }else if(msg.path&&LIVE_DATA){
          // Apply patch to LIVE_DATA
          _applyPatch(LIVE_DATA,msg.path,msg.value);
          _stateVersion=msg.version||_stateVersion+1;
          if(_onPatch)_onPatch(msg);
        }
      }catch(err){console.warn("[ws] Parse error:",err);}
    };
    _ws.onclose=function(){_ws=null;setTimeout(_connectWS,5000);};
    _ws.onerror=function(){_ws=null;};
  }catch(e){console.warn("[ws]",e.message);}
}

function _applyPatch(obj,path,value){
  var parts=path.split(".");
  var target=obj;
  for(var i=0;i<parts.length-1;i++){
    var k=isNaN(parts[i])?parts[i]:parseInt(parts[i]);
    if(!target[k])target[k]={};
    target=target[k];
  }
  var last=isNaN(parts[parts.length-1])?parts[parts.length-1]:parseInt(parts[parts.length-1]);
  target[last]=value;
}

async function loadData(){
  try{
    // Try server first
    var serverUrl=await _detectServer();
    if(serverUrl){
      var r=await fetch(serverUrl+"/api/state");
      if(r.ok){
        var resp=await r.json();
        LIVE_DATA=resp.data;
        _stateVersion=resp.version;
        _connectWS();
        console.log("[radar] Loaded from server, version "+_stateVersion);
        return LIVE_DATA;
      }
    }
    // Fallback to static data.json
    var r=await fetch(DATA_URL);
    if(!r.ok) throw new Error("HTTP "+r.status);
    LIVE_DATA=await r.json();
    // Post-process: make timeAudit relative to today
    if(LIVE_DATA.timeAudit&&LIVE_DATA.timeAudit.today){
      LIVE_DATA.timeAudit.today.date=new Date().toISOString().slice(0,10);
    }
    // Post-process: make timeline event dates relative to today
    if(LIVE_DATA.timeline&&LIVE_DATA.timeline.sections){
      var dataDate=new Date("2026-03-03T12:00:00");
      var realToday=new Date();realToday.setHours(12,0,0,0);
      var offsetMs=realToday.getTime()-dataDate.getTime();
      var offsetDays=Math.round(offsetMs/86400000);
      if(offsetDays!==0){
        LIVE_DATA.timeline.sections.forEach(function(sec){
          if(sec.events)sec.events.forEach(function(ev){
            if(ev.date){
              var d=new Date(ev.date+"T12:00:00");
              d.setDate(d.getDate()+offsetDays);
              ev.date=d.toISOString().slice(0,10);
            }
          });
        });
      }
    }
    // Post-process: make Slack timestamps relative
    if(LIVE_DATA.team){
      var slackBase=new Date("2026-03-03T12:00:00").getTime();
      var nowMs=Date.now();
      var slackOff=nowMs-slackBase;
      LIVE_DATA.team.forEach(function(person){

    }
    console.log("[radar] Loaded from static data.json (server not available)");
    return LIVE_DATA;
  }catch(e){
    console.error("Failed to load data:",e);
    return null;
  }
}

function tryParse(s){
  try{return JSON.parse(s);}catch(e){return null;}
}

function extractInsightsFromPartial(text){
  var clean=text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
  var fixed=clean.replace(/,\s*([}\]])/g,"$1");
  // Try extracting individual insight objects using balanced brace matching
  var results=[];
  var inArr=fixed.indexOf("[");
  if(inArr<0) return results;
  var sub=fixed.slice(inArr+1);
  var depth=0; var start=-1;
  for(var ci=0;ci<sub.length;ci++){
    if(sub[ci]==="{"){if(depth===0)start=ci;depth++;}
    if(sub[ci]==="}"){depth--;if(depth===0&&start>=0){
      var chunk=sub.slice(start,ci+1);
      var obj=tryParse(chunk);
      if(obj&&obj.headline) results.push(obj);
      start=-1;
    }}
  }
  return results;
}

function robustParseFinal(text){
  var clean=text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
  if(!clean||clean.length===0) return{insights:[]};
  var parsed=tryParse(clean);
  if(parsed) return parsed;
  var fixed=clean.replace(/,\s*([}\]])/g,"$1");
  parsed=tryParse(fixed);
  if(parsed) return parsed;
  var m=fixed.match(/\{[\s\S]*"insights"\s*:\s*\[[\s\S]*\]\s*\}/);
  if(m){parsed=tryParse(m[0]);if(parsed)return parsed;}
  m=fixed.match(/"insights"\s*:\s*(\[[\s\S]*\])/);
  if(m){var arr=tryParse(m[1]);if(arr)return{insights:arr};}
  m=fixed.match(/\[[\s\S]*\]/);
  if(m){var arr2=tryParse(m[0]);if(arr2)return{insights:arr2};}
  var fixed2=fixed.replace(/":\s*"[^"]*\n/g,function(m){return m.replace(/\n/g,"\\n");});
  parsed=tryParse(fixed2);
  if(parsed) return parsed;
  // Last resort: extract whatever individual objects we can
  var partial=extractInsightsFromPartial(text);
  if(partial.length>0) return{insights:partial};
  throw new Error("Parse failed (len="+clean.length+"): "+clean.slice(0,200));
}

function compactData(data){
  var c=JSON.parse(JSON.stringify(data));
  function tail(arr,n){if(!arr)return arr;return arr.slice(-(n||7));}
  if(c.amplitude){
    var a=c.amplitude;

async function synthesizeStreaming(data, onInsight, onProgress){
  var t0=Date.now();
  onProgress("Connecting to synthesis engine...");
  var compact=compactData(data);
  var customPrompt="";
  try{customPrompt=window.__RADAR_CUSTOM_PROMPT||getCustomPrompt()||"";}catch(e){}
  // Uses DEFAULT_PROMPT defined above
  var systemPrompt=customPrompt||DEFAULT_PROMPT;
  var apiKey=getKey();
  if(!apiKey)throw new Error("No API key. Open Settings and add your Anthropic key.");
  var r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-sonnet-4-5-20250929",max_tokens:8192,stream:true,
      system:systemPrompt,
      messages:[{role:"user",content:"Synthesize ALL signals into 12-15 actionable items. You MUST produce at least 12 items. There are "+((data.signals||[]).length)+" input signals. Every signal should be represented. Do NOT stop at 4-5 items.\n\nData:\n"+JSON.stringify(compact)}],
    }),
  });
  if(!r.ok){
    var errBody=await r.text().catch(function(){return"";});
    console.error("[radar] API error:",errBody);throw new Error("API "+r.status+": "+errBody.slice(0,500));
  }
  var reader=r.body.getReader();
  var decoder=new TextDecoder();
  var fullText="";
  var lastYielded=0;
  var buffer="";
  onProgress("Scanning sources...");
  while(true){
    var chunk=reader.read();
    var result=await chunk;
    if(result.done) break;
    buffer+=decoder.decode(result.value,{stream:true});
    var evts=buffer.split("\n");
    buffer=evts.pop()||"";
    for(var ei=0;ei<evts.length;ei++){
      var line=evts[ei];
      if(!line.startsWith("data: "))continue;
      var payload=line.slice(6);
      if(payload==="[DONE]")continue;
      var evt=tryParse(payload);
      if(!evt)continue;
      if(evt.type==="content_block_delta"&&evt.delta&&evt.delta.text){
        fullText+=evt.delta.text;
        var partial=extractInsightsFromPartial(fullText);
        if(partial.length>lastYielded){
          for(var ni=lastYielded;ni<partial.length;ni++){
            onInsight(partial[ni],ni);
          }
          lastYielded=partial.length;
          onProgress(lastYielded+" item"+(lastYielded>1?"s":"")+" found...");
        }
      }
    }
  }
  var dur=((Date.now()-t0)/1000).toFixed(0);
  // Final parse for complete data
  var final=robustParseFinal(fullText);
  onProgress("Done \u2014 "+dur+"s");
  return{insights:final.insights||[],meta:{duration:dur,errors:[],sourcesOk:3}};
}

function evLabel(ev){
  if(ev.label&&ev.label.trim())return ev.label.trim();
  var srcName=SVC[ev.source]?.label||ev.source||"";
  if(!ev.url)return srcName||"Link";
  try{
    var u=new URL(ev.url);
    var host=u.hostname.replace(/^www\./,"");
    var path=u.pathname.split("/").filter(Boolean);
    if(host.includes("amplitude")){
      if(path.includes("chart"))return srcName+": Chart "+path.slice(-1)[0];
      if(path.includes("dashboard"))return srcName+": Dashboard";
      return srcName+(path.length>2?": "+path.slice(-1)[0]:"");
    }
    if(host.includes("linear")){
      var last=path.slice(-1)[0]||"";
      if(/^[A-Z]+-\d+$/.test(last))return last;
      return srcName+(last?": "+last:"");
    }
    if(host.includes("slack"))return srcName+": thread";
    if(host.includes("docs.google"))return "Google Doc";
    if(host.includes("calendar.google"))return srcName+": event";
    if(host.includes("granola"))return srcName+": meeting notes";
    if(host.includes("gmail"))return "Gmail: message";
    if(path.length>0){
      var seg=decodeURIComponent(path.slice(-1)[0]).replace(/[-_]/g," ");
      return seg.length>30?seg.slice(0,28)+"\u2026":seg;
    }
    return srcName||host.replace(/\.com$|\.io$|\.app$/,"")||"Link";
  }catch(e){return srcName||"Link";}
}

function AnimNum({value,dur}){
  var duration=dur||800;
  var[display,setDisplay]=useState(0);
  var ref=useRef();
  useEffect(function(){
    var target=parseInt(value)||0;
    if(target===0){setDisplay(value);return;}
    var start=null;
    function tick(ts){
      if(!start)start=ts;
      var p=Math.min((ts-start)/duration,1);
      var ease=1-Math.pow(1-p,4);
      setDisplay(Math.round(target*ease));
      if(p<1)ref.current=requestAnimationFrame(tick);
    }
    ref.current=requestAnimationFrame(tick);
    return function(){cancelAnimationFrame(ref.current);};
  },[value,duration]);
  return <span>{display}</span>;
}

// Glass Card
function GlassCard({item,index,c,dk,onAction}){
  var[h,setH]=useState(false);
  var[actH,setActH]=useState(false);
  var[actP,setActP]=useState(false);
  var[evEx,setEvEx]=useState(false);
  var[specPos,setSpecPos]=useState({x:50,y:0});
  var cardRef=useRef(null);

  var onMove=useCallback(function(e){
    if(!cardRef.current)return;
    var rect=cardRef.current.getBoundingClientRect();
    setSpecPos({x:((e.clientX-rect.left)/rect.width)*100,y:((e.clientY-rect.top)/rect.height)*100});
  },[]);

  var ev=item.evidence||[];
  var maxEv=3;
  var visEv=evEx?ev:ev.slice(0,maxEv);
  var hasMore=ev.length>maxEv;
  var pr=item.priority?PRI[(item.priority||"").toUpperCase()]:null;

  return(
    <article ref={cardRef}
      onMouseEnter={function(){setH(true);}}
      onMouseLeave={function(){setH(false);setSpecPos({x:50,y:0});}}
      onMouseMove={h?onMove:undefined}
      style={{
        position:"relative",borderRadius:22,padding:"24px 26px 22px",cursor:"default",
        background:h?c.glassH:c.glass,
        backdropFilter:"blur(40px) saturate(180%) brightness(1.02)",
        WebkitBackdropFilter:"blur(40px) saturate(180%) brightness(1.02)",
        border:"0.5px solid "+(h?c.borderH:c.border),
        boxShadow:[
          h?"0 12px 48px rgba(0,0,0,"+(dk?"0.35":"0.10")+")":"0 1px 8px rgba(0,0,0,"+(dk?"0.12":"0.04")+")",
          "inset 0 1px 0 "+(h?c.highlightH:c.highlight),
          "inset 0 0 0 0.5px "+c.border,
        ].join(","),
        transition:"all 0.45s cubic-bezier(0.25,1,0.5,1)",
        transform:h?"translateY(-3px) scale(1.004)":"translateY(0) scale(1)",
        animation:"glassIn 0.6s cubic-bezier(0.16,1,0.3,1) "+(0.05+index*0.045)+"s both",
        overflow:"hidden",
      }}>
      {/* Cursor-reactive specular */}
      <div style={{position:"absolute",inset:0,borderRadius:22,pointerEvents:"none",
        background:"radial-gradient(ellipse 60% 50% at "+specPos.x+"% "+specPos.y+"%, "+(h?c.highlightH:c.highlight)+" 0%, transparent 70%)",
        opacity:h?1:0.5,transition:"opacity 0.4s ease"}} />
      {/* Top specular edge */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:1,borderRadius:"22px 22px 0 0",
        background:"linear-gradient(90deg, transparent 10%, "+c.highlight+" 50%, transparent 90%)",
        opacity:h?1:0.6,transition:"opacity 0.3s ease"}} />

      <div style={{position:"relative",zIndex:1}}>
        {/* Synthesis text */}
        <p style={{fontSize:16.5,lineHeight:1.62,color:c.l1,fontFamily:FT,fontWeight:400,margin:0,
          letterSpacing:"-0.012em"}}>{item.headline||item.body||item.text||""}</p>

        {/* Metric */}
        {item.context&&item.context.metric&&(
          <div style={{display:"flex",alignItems:"baseline",gap:8,marginTop:18}}>
            <span style={{fontSize:36,fontWeight:700,fontFamily:FD,letterSpacing:"-0.04em",color:c.l1,lineHeight:1,
              fontFeatureSettings:"'tnum'"}}>{item.context.metric}</span>
            {item.context.delta&&(
              <span style={{fontSize:14,fontWeight:600,fontFamily:FT,
                color:item.context.delta.indexOf("+")===0?c.green:item.context.delta.indexOf("-")===0?c.red:c.l3,
                background:item.context.delta.indexOf("+")===0?c.greenTint:item.context.delta.indexOf("-")===0?c.redTint:"transparent",
                padding:"3px 10px",borderRadius:8}}>{item.context.delta}</span>
            )}
          </div>
        )}

        {/* Action */}
        {item.action&&(
          <button
            onMouseEnter={function(){setActH(true);}}
            onMouseLeave={function(){setActH(false);setActP(false);}}
            onMouseDown={function(){setActP(true);}}
            onMouseUp={function(){setActP(false);if(onAction)onAction(item);}}
            style={{marginTop:18,padding:"11px 24px",borderRadius:14,border:"none",
              background:actP?c.f3:actH?c.blueTint:c.f4,
              color:actH?c.blue:c.l2,
              fontSize:15,fontFamily:FT,fontWeight:500,cursor:"pointer",letterSpacing:"-0.01em",
              transition:"all 0.2s cubic-bezier(0.25,1,0.5,1)",
              transform:actP?"scale(0.96)":"scale(1)",
              WebkitTapHighlightColor:"transparent"}}>
            {item.action}
          </button>
        )}

        {/* Evidence */}
        {ev.length>0&&(
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:16,alignItems:"center"}}>
            {visEv.map(function(e,i){
              var icon=SRCICON[e.source]||"\u{1F517}";
              var label=evLabel?evLabel(e):(e.label||e.source||"Link");
              return(
                <a key={i} href={e.url||"#"} target="_blank" rel="noopener"
                  onClick={function(ev){ev.stopPropagation();}}
                  style={{display:"inline-flex",alignItems:"center",gap:5,
                    padding:"5px 12px",borderRadius:10,
                    fontSize:13,fontFamily:FT,fontWeight:400,
                    color:c.l2,textDecoration:"none",
                    background:c.glassThin,
                    backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",
                    border:"0.5px solid "+(dk?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.30)"),
                    transition:"all 0.2s ease",letterSpacing:"-0.01em",
                    animation:evEx&&i>=maxEv?"glassIn 0.3s ease "+((i-maxEv)*0.05)+"s both":"none"}}
                  onMouseEnter={function(ev){ev.currentTarget.style.color=c.l1;ev.currentTarget.style.borderColor=dk?"rgba(255,255,255,0.14)":"rgba(255,255,255,0.50)";}}
                  onMouseLeave={function(ev){ev.currentTarget.style.color=c.l2;ev.currentTarget.style.borderColor=dk?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.30)";}}>
                  <span style={{fontSize:12,lineHeight:1}}>{icon}</span>
                  {label.length>28?label.slice(0,26)+"\u2026":label}
                </a>
              );
            })}
            {hasMore&&!evEx&&(
              <button onClick={function(e){e.stopPropagation();setEvEx(true);}}
                style={{padding:"5px 12px",borderRadius:10,border:"none",background:"transparent",
                  color:c.l3,fontSize:13,fontFamily:FT,cursor:"pointer",transition:"color 0.2s"}}
                onMouseEnter={function(e){e.currentTarget.style.color=c.l1;}}
                onMouseLeave={function(e){e.currentTarget.style.color=c.l3;}}>
                +{ev.length-maxEv} more
              </button>
            )}
          </div>
        )}
      </div>
    </article>
  );
}

// Settings modal
function SettingsModal({c,dk,onClose}){
  var[key,setKey]=useState(function(){try{return localStorage.getItem("radar_api_key")||"";}catch(e){return"";}});
  var[prompt,setPrompt]=useState(function(){try{return localStorage.getItem("radar_custom_prompt")||DEFAULT_PROMPT||"";}catch(e){return"";}});
  var[showKey,setShowKey]=useState(false);
  function save(){
    try{localStorage.setItem("radar_api_key",key);}catch(e){}
    try{localStorage.setItem("radar_custom_prompt",prompt);window.__RADAR_CUSTOM_PROMPT=prompt;}catch(e){}
    onClose();
  }
  function resetPrompt(){setPrompt("");try{localStorage.removeItem("radar_custom_prompt");window.__RADAR_CUSTOM_PROMPT="";}catch(e){}}
  var iStyle={width:"100%",padding:"10px 14px",borderRadius:10,border:"0.5px solid "+c.border,
    background:c.glassThin,backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",
    color:c.l1,outline:"none"};
  return(
    <div style={{position:"fixed",inset:0,zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center",
      background:"rgba(0,0,0,"+(dk?"0.6":"0.3")+")",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)"}}
      onClick={onClose}>
      <div onClick={function(e){e.stopPropagation();}}
        style={{width:Math.min(520,window.innerWidth-32),maxHeight:"85vh",overflowY:"auto",padding:28,borderRadius:22,
          background:dk?c.glass:c.glassH,backdropFilter:"blur(40px) saturate(180%)",WebkitBackdropFilter:"blur(40px) saturate(180%)",
          border:"0.5px solid "+c.border,
          boxShadow:"0 24px 80px rgba(0,0,0,"+(dk?"0.5":"0.15")+"), inset 0 1px 0 "+c.highlight}}>
        <h2 style={{fontSize:20,fontWeight:700,fontFamily:FD,color:c.l1,marginBottom:24,letterSpacing:"-0.02em"}}>Settings</h2>

        <label style={{fontSize:11,fontFamily:FT,color:c.l3,display:"block",marginBottom:6,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>API Key</label>
        <div style={{display:"flex",gap:8,marginBottom:24}}>
          <input value={key} onChange={function(e){setKey(e.target.value);}} type={showKey?"text":"password"} placeholder="sk-ant-..."
            style={Object.assign({},iStyle,{flex:1,fontSize:14,fontFamily:FM})} />
          <button onClick={function(){setShowKey(!showKey);}} style={{padding:"0 14px",borderRadius:10,border:"0.5px solid "+c.border,
            background:c.glassThin,color:c.l3,fontSize:13,fontFamily:FT,cursor:"pointer",transition:"color 0.2s"}}
            onMouseEnter={function(e){e.currentTarget.style.color=c.l1;}}
            onMouseLeave={function(e){e.currentTarget.style.color=c.l3;}}>
            {showKey?"Hide":"Show"}
          </button>
        </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
          <label style={{fontSize:11,fontFamily:FT,color:c.l3,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>Synthesis Prompt</label>
          {prompt&&<button onClick={resetPrompt} style={{fontSize:12,fontFamily:FT,color:c.blue,background:"none",border:"none",cursor:"pointer"}}>Reset</button>}
        </div>
        <p style={{fontSize:13,fontFamily:FT,color:c.l4,marginBottom:8,lineHeight:1.5}}>
          This prompt tells Claude how to synthesize your data. Edit to change what RADAR looks for and how it writes.
        </p>
        <textarea value={prompt} onChange={function(e){setPrompt(e.target.value);}}
          placeholder="Enter your synthesis prompt..."
          rows={10}
          style={Object.assign({},iStyle,{resize:"vertical",lineHeight:1.55,fontSize:13,fontFamily:FT,minHeight:160})} />

        <div style={{display:"flex",gap:8,marginTop:24}}>
          <button onClick={save} style={{flex:1,padding:"12px 0",borderRadius:12,border:"none",
            background:c.blue,color:"#fff",fontSize:15,fontFamily:FT,fontWeight:600,cursor:"pointer",
            transition:"transform 0.15s"}}
            onMouseDown={function(e){e.currentTarget.style.transform="scale(0.97)";}}
            onMouseUp={function(e){e.currentTarget.style.transform="scale(1)";}}
            onMouseLeave={function(e){e.currentTarget.style.transform="scale(1)";}}>Save</button>
          <button onClick={onClose} style={{padding:"12px 20px",borderRadius:12,border:"none",
            background:c.f4,color:c.l2,fontSize:15,fontFamily:FT,fontWeight:500,cursor:"pointer"}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// MAIN APP
// ============================================================
function RadarApp(){
  var sysDark=typeof window!=="undefined"&&window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches;
  var[dk,setDk]=useState(sysDark!==false);
  var[ready,setReady]=useState(false);
  var[scanning,setScanning]=useState(false);
  var[progress,setProgress]=useState("");
  var[items,setItems]=useState([]);
  var[settings,setSettings]=useState(false);
  var[transitioning,setTransitioning]=useState(false);
  var[scanError,setScanError]=useState("");
  var c=dk?CP.dark:CP.light;
  var hour=new Date().getHours();
  var mesh=meshColors(dk,hour);

  useEffect(function(){requestAnimationFrame(function(){setReady(true);});},[]);

  // Auto-scan on mount
  useEffect(function(){
    var hasKey=!!getKey();
    var t=hasKey?setTimeout(function(){scan();},400):null;
    return function(){if(t)clearTimeout(t);};
  },[]);

  function toggleTheme(){
    setTransitioning(true);
    setTimeout(function(){setDk(!dk);setTimeout(function(){setTransitioning(false);},500);},50);
  }

  async function scan(){
    if(scanning)return;
    setScanning(true);setProgress("Starting scan...");setItems([]);setScanError("");
    try{
      // 90 second timeout for scan
      var result=await runLiveScan(
        function(ins,idx){setItems(function(prev){var n=[].concat(prev);n[idx]=ins;return n;});},
        function(msg){setProgress(msg);}
      );
      if(result&&result.insights)setItems(result.insights);
      setProgress("");
    }catch(e){
      setScanError("Error: "+e.message.slice(0,80));setProgress("");
    }
    setScanning(false);
  }

  function handleAction(item){
    if(item.action){
      try{navigator.clipboard.writeText(item.action);}catch(e){}
    }
  }

  var now=new Date();
  var greeting=hour<12?"Good morning":hour<17?"Good afternoon":"Good evening";
  var dateStr=now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

  // Combine headline+body into synthesis text for display
  var feedItems=items.map(function(item){
    var text=item.body||item.headline||"";
    if(item.headline&&item.body&&item.headline!==item.body){
      text=item.body;
    }
    return Object.assign({},item,{text:text});
  });

  return(
    <div style={{minHeight:"100vh",background:c.bg,position:"relative",overflow:"hidden",
      transition:"background 0.6s cubic-bezier(0.25,1,0.5,1)",
      opacity:transitioning?0.92:1}}>
      <style>{"::selection{background:"+(dk?"rgba(10,132,255,0.40)":"rgba(0,122,255,0.20)")+"}"}</style>

      {/* Ambient mesh */}
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,transition:"opacity 0.8s ease",opacity:transitioning?0:1}}>
        <div style={{position:"absolute",inset:"-25%",background:mesh.m1,animation:"meshDrift1 28s ease-in-out infinite",willChange:"transform"}} />
        <div style={{position:"absolute",inset:"-15%",background:mesh.m2,animation:"meshDrift2 22s ease-in-out infinite",willChange:"transform"}} />
        <div style={{position:"absolute",inset:"-20%",background:mesh.m3,animation:"meshDrift1 32s ease-in-out infinite reverse",willChange:"transform"}} />
      </div>

      <div style={{position:"relative",zIndex:1,maxWidth:700,margin:"0 auto",padding:"0 24px"}}>

        {/* Header */}
        <header style={{paddingTop:64,paddingBottom:28,animation:"headerIn 0.9s cubic-bezier(0.16,1,0.3,1) both"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:11,fontFamily:FM,fontWeight:500,color:c.l4,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:14}}>RADAR</div>
              <h1 style={{fontSize:42,fontWeight:700,fontFamily:FD,color:c.l1,letterSpacing:"-0.025em",lineHeight:1.04}}>{greeting}</h1>
              <p style={{fontSize:20,fontFamily:FT,color:c.l3,fontWeight:400,marginTop:6,letterSpacing:"-0.01em"}}>{dateStr}</p>
            </div>
            <div style={{display:"flex",gap:10,paddingTop:30}}>
              <button onClick={function(){setSettings(true);}} aria-label="Settings" style={{
                width:44,height:44,borderRadius:22,
                background:c.glassThin,backdropFilter:"blur(24px) saturate(150%)",WebkitBackdropFilter:"blur(24px) saturate(150%)",
                border:"0.5px solid "+c.border,color:c.l2,fontSize:16,cursor:"pointer",
                display:"grid",placeItems:"center",transition:"all 0.3s cubic-bezier(0.25,1,0.5,1)",
                boxShadow:"inset 0 1px 0 "+c.highlight+", 0 1px 4px rgba(0,0,0,"+(dk?"0.15":"0.04")+")",
                WebkitTapHighlightColor:"transparent"}}
                onMouseDown={function(e){e.currentTarget.style.transform="scale(0.88)";}}
                onMouseUp={function(e){e.currentTarget.style.transform="scale(1)";}}
                onMouseLeave={function(e){e.currentTarget.style.transform="scale(1)";}}>
                {"⚙"}
              </button>
              <button onClick={toggleTheme} aria-label="Toggle theme" style={{
                width:44,height:44,borderRadius:22,
                background:c.glassThin,backdropFilter:"blur(24px) saturate(150%)",WebkitBackdropFilter:"blur(24px) saturate(150%)",
                border:"0.5px solid "+c.border,color:c.l2,fontSize:18,cursor:"pointer",
                display:"grid",placeItems:"center",transition:"all 0.3s cubic-bezier(0.25,1,0.5,1)",
                boxShadow:"inset 0 1px 0 "+c.highlight+", 0 1px 4px rgba(0,0,0,"+(dk?"0.15":"0.04")+")",
                WebkitTapHighlightColor:"transparent"}}
                onMouseDown={function(e){e.currentTarget.style.transform="scale(0.88)";}}
                onMouseUp={function(e){e.currentTarget.style.transform="scale(1)";}}
                onMouseLeave={function(e){e.currentTarget.style.transform="scale(1)";}}>
                {dk?"\u2600\uFE0F":"\u{1F319}"}
              </button>
              <button onClick={scan} style={{
                height:44,borderRadius:22,padding:"0 22px",
                background:c.glassThin,backdropFilter:"blur(24px) saturate(150%)",WebkitBackdropFilter:"blur(24px) saturate(150%)",
                border:scanning?"1.5px solid "+c.blue:"0.5px solid "+c.border,color:scanning?c.blue:c.l2,
                fontSize:14.5,fontFamily:FT,fontWeight:500,cursor:"pointer",
                display:"flex",alignItems:"center",gap:0,
                animation:scanning?(dk?"shimmer 2s ease-in-out infinite":"shimmerLight 2s ease-in-out infinite"):"none",
                transition:"all 0.3s cubic-bezier(0.25,1,0.5,1)",letterSpacing:"-0.01em",
                boxShadow:"inset 0 1px 0 "+c.highlight+", 0 1px 4px rgba(0,0,0,"+(dk?"0.15":"0.04")+")",
                WebkitTapHighlightColor:"transparent"}}>
  {scanning?"Scanning\u2026":"Scan"}
              </button>
            </div>
          </div>

          {/* Meta */}
          <div style={{marginTop:28,display:"flex",alignItems:"baseline",gap:6,animation:"headerIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.12s both"}}>
            {items.length>0&&<>
              <span style={{fontSize:14,fontFamily:FT,fontWeight:600,color:c.l2}}><AnimNum value={items.length} /></span>
              <span style={{fontSize:14,fontFamily:FT,color:c.l3}}>items</span>
              <span style={{color:c.l4,margin:"0 4px"}}>{"·"}</span>
            </>}
            <span style={{fontSize:14,fontFamily:FT,color:c.l4}}>
              {scanning?progress:scanError?scanError:items.length>0?"Just now":"Enter API key in \u2699 to scan"}
            </span>
          </div>
        </header>

        {/* Scanning skeleton */}
        {scanning&&items.length===0&&(
          <div style={{display:"flex",flexDirection:"column",gap:12,paddingBottom:40}}>
            {[0,1,2,3].map(function(i){return(
              <div key={i} style={{borderRadius:22,padding:"24px 26px",
                background:c.glass,backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",
                border:"0.5px solid "+c.border,animation:"pulse 1.5s ease infinite",animationDelay:(i*0.2)+"s"}}>
                <div style={{height:16,width:"75%",background:c.f4,borderRadius:8,marginBottom:12}} />
                <div style={{height:14,width:"90%",background:c.f4,borderRadius:8,marginBottom:8,opacity:0.6}} />
                <div style={{height:14,width:"50%",background:c.f4,borderRadius:8,opacity:0.4}} />
              </div>
            );})}
          </div>
        )}

        {/* Feed */}
        {ready&&(
          <div style={{display:"flex",flexDirection:"column",gap:12,paddingBottom:120}}>
            {feedItems.map(function(item,i){return(
              <GlassCard key={item.id||i} item={item} index={i} c={c} dk={dk} onAction={handleAction} />
            );})}
          </div>
        )}
      </div>

      {/* Settings */}
      {settings&&<SettingsModal c={c} dk={dk} onClose={function(){setSettings(false);}} />}
    </div>
  );
}

// Wrap in AuthGate
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(error){return{error};}
  render(){
    if(this.state.error){
      return React.createElement("div",{style:{padding:40,fontFamily:"-apple-system,system-ui,sans-serif",fontSize:14,color:"#FF453A",background:"#1C1C1E",minHeight:"100vh",whiteSpace:"pre-wrap"}},
        "RADAR Error:\n\n"+this.state.error.toString()+"\n\n"+(this.state.error.stack||""));
    }
    return this.props.children;
  }
}

var root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ErrorBoundary,null,React.createElement(AuthGate,null,React.createElement(RadarApp))));

</script>
