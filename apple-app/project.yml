name: NoahSite
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    CODE_SIGN_STYLE: Automatic
targets:
  NoahSite-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/Shared
      - Sources/AppleApp/iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noahlucas.site.ios
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Noah Site
        TARGETED_DEVICE_FAMILY: 1,2

  NoahSite-Watch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - Sources/Shared
      - Sources/AppleApp/Watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noahlucas.site.watch
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Noah Watch

  NoahSite-Vision:
    type: application
    platform: visionOS
    deploymentTarget: "1.0"
    sources:
      - Sources/Shared
      - Sources/AppleApp/Vision
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noahlucas.site.vision
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Noah Vision

schemes:
  NoahSite-iOS:
    build:
      targets:
        NoahSite-iOS: all
    run:
      config: Debug

  NoahSite-Watch:
    build:
      targets:
        NoahSite-Watch: all
    run:
      config: Debug

  NoahSite-Vision:
    build:
      targets:
        NoahSite-Vision: all
    run:
      config: Debug
